name: SF Rentals Hourly

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  fetch-rentals:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and generate listings
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          python3 << 'EOF'
          import requests
          import json
          import re
          import os
          from datetime import datetime, timezone

          API_KEY = os.environ["RAPIDAPI_KEY"]
          HEADERS = {
              "x-rapidapi-key": API_KEY,
              "x-rapidapi-host": "zillow-scraper-api.p.rapidapi.com"
          }

          EXCLUDED_ZIPS = {"94103", "94105", "94107", "94108", "94110"}

          def is_big_complex(listing):
              address = listing.get("address", "")
              detail_url = listing.get("detail_url", "")
              if re.match(r"^[A-Za-z][A-Za-z\s]+,\s+\d+", address):
                  return True
              if "/apartments/san-francisco-ca/" in detail_url:
                  slug = detail_url.split("/apartments/san-francisco-ca/")[-1].strip("/").split("/")[0]
                  if not re.match(r"^\d+", slug):
                      return True
              return False

          def is_excluded_neighborhood(listing):
              zipcode = str(listing.get("zipcode") or "")
              lat = listing.get("latitude")
              if zipcode in EXCLUDED_ZIPS:
                  return True
              if zipcode == "94102" and lat and lat < 37.773:
                  return True
              if zipcode == "94109" and lat and lat < 37.793:
                  return True
              return False

          def fetch_listings():
              all_listings = []
              for page in range(1, 9):
                  try:
                      resp = requests.get(
                          "https://zillow-scraper-api.p.rapidapi.com/search",
                          headers=HEADERS,
                          params={
                              "location": "San Francisco, CA",
                              "status": "for_rent",
                              "beds_min": "1",
                              "price_min": "3000",
                              "price_max": "4000",
                              "page": str(page)
                          },
                          timeout=30
                      )
                      data = resp.json()
                      listings = data.get("listings") or data.get("results") or []
                      if not listings:
                          break
                      all_listings.extend(listings)
                  except Exception as e:
                      print(f"Page {page} error: {e}")
                      break
              return all_listings

          def get_property_details(zpid):
              try:
                  resp = requests.get(
                      "https://zillow-scraper-api.p.rapidapi.com/property",
                      headers=HEADERS,
                      params={"zpid": str(zpid)},
                      timeout=30
                  )
                  return resp.json()
              except:
                  return {}

          def extract_parking(description):
              if not description:
                  return None
              desc_lower = description.lower()
              if "garage" in desc_lower:
                  sentences = re.split(r'[.!?]', description)
                  for s in sentences:
                      if "garage" in s.lower():
                          return s.strip()
              if "parking" in desc_lower:
                  sentences = re.split(r'[.!?]', description)
                  for s in sentences:
                      if "parking" in s.lower():
                          return s.strip()
              return None

          def days_label(days):
              if days == 0:
                  return '<span class="badge today">Today</span>'
              elif days == 1:
                  return '<span class="badge yesterday">Yesterday</span>'
              return f'<span class="badge older">{days}d ago</span>'

          print("Fetching listings...")
          raw = fetch_listings()
          print(f"Total raw: {len(raw)}")

          # Filter: recent (0-1 days), not big complex, not excluded neighborhood
          filtered = []
          for l in raw:
              days = l.get("days_on_zillow")
              if days is None or days > 1:
                  continue
              if is_big_complex(l):
                  continue
              if is_excluded_neighborhood(l):
                  continue
              filtered.append(l)

          print(f"Filtered to {len(filtered)} qualifying listings")

          # Fetch details for each
          detailed = []
          for l in filtered:
              zpid = l.get("zpid")
              details = get_property_details(zpid) if zpid else {}
              detailed.append({**l, **details})

          # Generate HTML
          now_str = datetime.now(timezone.utc).strftime("%B %d, %Y at %H:%M UTC")

          cards_html = ""
          if detailed:
              for p in detailed:
                  address = p.get("address", "Unknown address")
                  price = p.get("price") or p.get("rent_price") or "N/A"
                  if isinstance(price, (int, float)):
                      price = f"${price:,.0f}/mo"
                  beds = p.get("bedrooms") or p.get("beds", "?")
                  baths = p.get("bathrooms") or p.get("baths", "?")
                  sqft = p.get("living_area") or p.get("sqft", "")
                  days = p.get("days_on_zillow", 0)
                  description = p.get("description", "")
                  detail_url = p.get("detail_url") or p.get("url", "")
                  if detail_url and not detail_url.startswith("http"):
                      detail_url = "https://www.zillow.com" + detail_url
                  parking = extract_parking(description)

                  amenities = []
                  if p.get("has_garage") or (parking and "garage" in parking.lower()):
                      amenities.append("Garage")
                  if p.get("laundry_features"):
                      amenities.append(p["laundry_features"])
                  if p.get("pets_allowed"):
                      amenities.append("Pets OK")
                  if p.get("air_conditioning"):
                      amenities.append("A/C")

                  amenities_html = ""
                  if amenities:
                      tags = "".join(f'<span class="tag">{a}</span>' for a in amenities)
                      amenities_html = f'<div class="amenities">{tags}</div>'

                  parking_html = ""
                  if parking:
                      parking_html = f'<p class="parking"><strong>Parking:</strong> {parking}</p>'

                  sqft_html = f'<span>{sqft:,} sqft</span>' if sqft else ""

                  link_html = ""
                  if detail_url:
                      link_html = f'<a href="{detail_url}" target="_blank" class="btn">View on Zillow</a>'

                  cards_html += f"""
                  <div class="card">
                    <div class="card-header">
                      <div>
                        <div class="address">{address}</div>
                        <div class="meta">{beds} bed · {baths} bath {sqft_html}</div>
                      </div>
                      <div class="right">
                        <div class="price">{price}</div>
                        {days_label(days)}
                      </div>
                    </div>
                    {parking_html}
                    {amenities_html}
                    {link_html}
                  </div>
                  """
          else:
              cards_html = '<div class="empty">No listings found matching your criteria right now. Check back soon.</div>'

          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>SF Rentals — Fresh Listings</title>
            <style>
              * {{ box-sizing: border-box; margin: 0; padding: 0; }}
              body {{ font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }}
              header {{ background: #1a1a2e; color: white; padding: 1.5rem 2rem; }}
              header h1 {{ font-size: 1.5rem; font-weight: 700; }}
              header p {{ font-size: 0.85rem; opacity: 0.7; margin-top: 0.3rem; }}
              .criteria {{ background: #16213e; color: #a0aec0; font-size: 0.8rem; padding: 0.6rem 2rem; }}
              .container {{ max-width: 900px; margin: 2rem auto; padding: 0 1rem; }}
              .count {{ font-size: 0.9rem; color: #666; margin-bottom: 1rem; }}
              .card {{ background: white; border-radius: 10px; padding: 1.2rem 1.5rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }}
              .card-header {{ display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }}
              .address {{ font-weight: 600; font-size: 1rem; }}
              .meta {{ font-size: 0.85rem; color: #666; margin-top: 0.25rem; }}
              .right {{ text-align: right; flex-shrink: 0; }}
              .price {{ font-size: 1.2rem; font-weight: 700; color: #27ae60; }}
              .badge {{ display: inline-block; font-size: 0.7rem; font-weight: 600; padding: 0.2rem 0.5rem; border-radius: 4px; margin-top: 0.3rem; }}
              .today {{ background: #d4edda; color: #155724; }}
              .yesterday {{ background: #fff3cd; color: #856404; }}
              .older {{ background: #e2e3e5; color: #383d41; }}
              .parking {{ font-size: 0.85rem; color: #555; margin-top: 0.75rem; }}
              .amenities {{ margin-top: 0.75rem; }}
              .tag {{ display: inline-block; background: #eef2ff; color: #4338ca; font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 20px; margin-right: 0.4rem; margin-top: 0.2rem; }}
              .btn {{ display: inline-block; margin-top: 1rem; background: #1a1a2e; color: white; text-decoration: none; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem; }}
              .btn:hover {{ background: #2d2d4e; }}
              .empty {{ text-align: center; padding: 3rem; color: #888; background: white; border-radius: 10px; }}
            </style>
          </head>
          <body>
            <header>
              <h1>SF Rentals — Fresh Listings</h1>
              <p>Updated: {now_str}</p>
            </header>
            <div class="criteria">1 bed min · $3,000–$4,000/mo · Listed in last 24h · No big complexes · No Nob Hill / Tenderloin / Mission / SOMA</div>
            <div class="container">
              <p class="count">{len(detailed)} listing{'s' if len(detailed) != 1 else ''} found</p>
              {cards_html}
            </div>
          </body>
          </html>"""

          # Dedent
          lines = html.split('\n')
          cleaned = '\n'.join(line[10:] if line.startswith(' ' * 10) else line for line in lines)

          with open("index.html", "w") as f:
              f.write(cleaned)

          print("index.html written successfully")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Update SF rental listings $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
