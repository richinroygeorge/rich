<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f3f4f6; color: #111; }
  header { background: #1a1a2e; color: #fff; padding: 1.5rem 2rem; }
  header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -.5px; }
  header .ts { font-size: .8rem; opacity: .65; margin-top: .25rem; }
  .filter-bar { background: #16213e; color: #94a3b8; font-size: .82rem; padding: .6rem 2rem; }
  main { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.09); padding: 1.25rem; display: flex; flex-direction: column; gap: .55rem; }
  .card-top { display: flex; align-items: flex-start; gap: .5rem; flex-wrap: wrap; }
  .badge { font-size: .7rem; font-weight: 700; color: #fff; padding: .2rem .55rem; border-radius: 999px; white-space: nowrap; }
  .address { font-weight: 700; font-size: .95rem; flex: 1; }
  .zip { font-size: .78rem; color: #6b7280; background: #f1f5f9; padding: .15rem .45rem; border-radius: 4px; white-space: nowrap; }
  .price { font-size: 1.55rem; font-weight: 800; color: #16a34a; }
  .meta { display: flex; gap: .75rem; font-size: .82rem; color: #4b5563; }
  .meta span::before { content: ''; }
  .parking { font-size: .78rem; color: #374151; background: #fefce8; border-left: 3px solid #fbbf24; padding: .3rem .6rem; border-radius: 0 4px 4px 0; }
  .tags { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .1rem; }
  .tag { background: #eff6ff; color: #1d4ed8; font-size: .72rem; padding: .15rem .45rem; border-radius: 999px; }
  .btn { display: inline-block; margin-top: auto; background: #1a1a2e; color: #fff; text-decoration: none; text-align: center; padding: .6rem 1rem; border-radius: 7px; font-size: .85rem; font-weight: 600; transition: background .2s; }
  .btn:hover { background: #2d2d5e; }
  .empty { grid-column: 1/-1; text-align: center; padding: 3rem 1rem; color: #6b7280; font-size: 1rem; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
</style>
</head>
<body>
<header>
  <h1>SF Rentals - Fresh Listings</h1>
  <div class="ts">Generated: 2026-04-05T08:03:53.961777+00:00 UTC</div>
</header>
<div class="filter-bar">1+ bed &middot; $3,000-$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA</div>
<main>
  <div class="grid">
    <div class="empty">No qualifying listings found at this time. All pages returned connection errors — the proxy blocked outbound HTTPS access.</div>
  </div>
</main>
</body>
</html>
