<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    color: #222;
    min-height: 100vh;
  }
  header {
    background: #1a1a2e;
    color: #fff;
    padding: 24px 32px;
  }
  header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  header .meta {
    margin-top: 6px;
    font-size: 0.85rem;
    color: #a0a8c0;
  }
  .filter-bar {
    background: #16213e;
    color: #c8d0e8;
    padding: 10px 32px;
    font-size: 0.82rem;
    letter-spacing: 0.3px;
  }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 16px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  @media (max-width: 900px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 560px) {
    .grid { grid-template-columns: 1fr; }
    header { padding: 18px 16px; }
    .filter-bar { padding: 10px 16px; }
  }
  .card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.10);
    padding: 22px 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .address {
    font-weight: 700;
    font-size: 1rem;
    line-height: 1.3;
    color: #1a1a2e;
  }
  .zip {
    font-size: 0.78rem;
    color: #666;
    margin-top: 2px;
  }
  .badge {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 12px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-today { background: #d4edda; color: #155724; }
  .badge-yesterday { background: #fff3cd; color: #856404; }
  .price {
    font-size: 1.6rem;
    font-weight: 800;
    color: #1a8a3c;
  }
  .specs {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 0.85rem;
    color: #444;
  }
  .spec-item { display: flex; align-items: center; gap: 4px; }
  .spec-item svg { opacity: 0.6; }
  .amenities {
    font-size: 0.78rem;
    color: #555;
    line-height: 1.5;
  }
  .amenities span {
    display: inline-block;
    background: #f0f2f5;
    border-radius: 4px;
    padding: 2px 7px;
    margin: 2px 3px 2px 0;
  }
  .parking {
    font-size: 0.8rem;
    color: #333;
    background: #eef4ff;
    border-left: 3px solid #4a6fa5;
    padding: 6px 10px;
    border-radius: 0 6px 6px 0;
  }
  .btn {
    display: block;
    text-align: center;
    background: #1a1a2e;
    color: #fff;
    text-decoration: none;
    padding: 10px;
    border-radius: 7px;
    font-size: 0.88rem;
    font-weight: 600;
    margin-top: auto;
    transition: background 0.15s;
  }
  .btn:hover { background: #2d2d5e; }
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: #666;
  }
  .empty-state h2 { font-size: 1.4rem; color: #333; margin-bottom: 10px; }
  .empty-state p { font-size: 0.95rem; }
</style>
</head>
<body>
<header>
  <h1>SF Rentals &mdash; Fresh Listings</h1>
  <div class="meta">Last updated: <span id="ts">2026-04-03T00:00:00+00:00</span> UTC</div>
</header>
<div class="filter-bar">
  1+ bed &nbsp;&middot;&nbsp; $3,000&ndash;$4,000/mo &nbsp;&middot;&nbsp; Listed in last 24hrs &nbsp;&middot;&nbsp; Excl. Nob Hill, Tenderloin, Mission, SOMA
</div>
<main>
  <div class="grid" id="listings-grid">
    <!-- listings injected here -->
  </div>
</main>

<script>
const data = {"listings": [], "timestamp": "2026-04-03T10:06:44.461009+00:00"};

document.getElementById('ts').textContent = data.timestamp ? data.timestamp.replace('T', ' ').replace(/\.\d+/, '') : '—';

const grid = document.getElementById('listings-grid');
const listings = data.listings || [];

if (listings.length === 0) {
  grid.innerHTML = `
    <div class="empty-state" style="grid-column:1/-1">
      <h2>No listings found right now</h2>
      <p>No rentals currently match: 1+ bed &middot; $3,000&ndash;$4,000/mo &middot; listed within 24 hours &middot; excluding filtered neighborhoods.<br>Check back soon &mdash; new listings appear throughout the day.</p>
    </div>`;
} else {
  listings.forEach(l => {
    const badge = l.days_on_zillow === 0
      ? '<span class="badge badge-today">Today</span>'
      : '<span class="badge badge-yesterday">Yesterday</span>';

    const beds = l.bedrooms != null ? `${l.bedrooms} bd` : '—';
    const baths = l.bathrooms != null ? `${l.bathrooms} ba` : '—';
    const sqft = l.living_area ? `${l.living_area.toLocaleString()} sqft` : '';

    // Parse parking from description
    let parking = '';
    const desc = (l.description || '') + (l.details?.description || '');
    const pkMatch = desc.match(/parking[^.!?\n]{0,80}/i);
    if (pkMatch) parking = pkMatch[0].replace(/\s+/g, ' ').trim();

    // Amenities
    const amenityList = [];
    if (l.details) {
      const d = l.details;
      if (d.hasAirConditioning) amenityList.push('A/C');
      if (d.hasGarage) amenityList.push('Garage');
      if (d.parkingSpaces) amenityList.push(`${d.parkingSpaces} Parking`);
      if (d.hasPool) amenityList.push('Pool');
      if (d.laundryFeatures) amenityList.push(d.laundryFeatures);
    }

    const amenitiesHtml = amenityList.length
      ? `<div class="amenities">${amenityList.map(a => `<span>${a}</span>`).join('')}</div>`
      : '';

    const parkingHtml = parking
      ? `<div class="parking">&#x1F697; ${parking}</div>`
      : '';

    const zillowUrl = l.detail_url
      ? (l.detail_url.startsWith('http') ? l.detail_url : 'https://www.zillow.com' + l.detail_url)
      : `https://www.zillow.com/homes/${l.zpid}_zpid/`;

    const card = `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="address">${l.address || '—'}</div>
            <div class="zip">${l.zipcode || ''}</div>
          </div>
          ${badge}
        </div>
        <div class="price">$${(l.price || 0).toLocaleString()}<span style="font-size:1rem;font-weight:400;color:#666">/mo</span></div>
        <div class="specs">
          <span class="spec-item">${beds}</span>
          <span class="spec-item">${baths}</span>
          ${sqft ? `<span class="spec-item">${sqft}</span>` : ''}
        </div>
        ${parkingHtml}
        ${amenitiesHtml}
        <a class="btn" href="${zillowUrl}" target="_blank" rel="noopener">View on Zillow &rarr;</a>
      </div>`;
    grid.insertAdjacentHTML('beforeend', card);
  });
}
</script>
</body>
</html>
