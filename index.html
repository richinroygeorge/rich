<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; }
  header { background: #1a1a2e; color: #fff; padding: 2rem 1.5rem 1.5rem; text-align: center; }
  header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
  header .ts { font-size: 0.8rem; opacity: 0.6; margin-top: 0.3rem; }
  .filter-bar { background: #16213e; color: #a8b4cc; text-align: center; padding: 0.6rem 1rem; font-size: 0.82rem; letter-spacing: 0.01em; }
  main { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); overflow: hidden; display: flex; flex-direction: column; }
  .card-top { padding: 1.1rem 1.1rem 0.7rem; flex: 1; }
  .card-bottom { padding: 0.7rem 1.1rem 1.1rem; border-top: 1px solid #f0f0f0; }
  .badge { display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.55rem; border-radius: 999px; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .badge.today { background: #d4edda; color: #155724; }
  .badge.yesterday { background: #fff3cd; color: #856404; }
  .address { font-weight: 700; font-size: 0.97rem; line-height: 1.3; }
  .zip { color: #666; font-size: 0.8rem; margin-top: 0.15rem; }
  .price { color: #1a7a3f; font-size: 1.55rem; font-weight: 800; margin: 0.5rem 0 0.15rem; }
  .meta { font-size: 0.82rem; color: #555; }
  .parking { font-size: 0.8rem; color: #444; margin-bottom: 0.5rem; }
  .chips { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.8rem; }
  .chip { background: #eef2ff; color: #3730a3; font-size: 0.72rem; padding: 0.2rem 0.55rem; border-radius: 999px; font-weight: 500; }
  .btn { display: block; text-align: center; background: #1a1a2e; color: #fff; text-decoration: none; padding: 0.55rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; transition: background 0.15s; }
  .btn:hover { background: #2d2d5e; }
  .empty { grid-column: 1/-1; text-align: center; padding: 4rem 1rem; color: #666; font-size: 1.1rem; }
</style>
</head>
<body>
<header>
  <h1>SF Rentals &mdash; Fresh Listings</h1>
  <div class="ts">Updated: 2026-04-05T09:15:46.288194+00:00 UTC</div>
</header>
<div class="filter-bar">
  1+ bed &bull; $3,000&ndash;$4,000/mo &bull; Listed in last 24hrs &bull; Excl. Nob Hill, Tenderloin, Mission, SOMA
</div>
<main>
  <div class="grid">
    <div class="empty">No listings matched your criteria right now. Check back soon.</div>
  </div>
</main>
</body>
</html>
