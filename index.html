<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; color: #222; }
  header { background: #1a1a2e; color: #fff; padding: 2rem 1.5rem 1.5rem; }
  header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; }
  .timestamp { font-size: 0.8rem; color: #a0a8c0; margin-top: 0.35rem; }
  .filter-bar { background: #16213e; color: #c8d0e8; font-size: 0.82rem; padding: 0.6rem 1.5rem; border-top: 1px solid #ffffff18; }
  .filter-bar span { margin-right: 1rem; }
  main { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); padding: 1.25rem; display: flex; flex-direction: column; gap: 0.6rem; position: relative; }
  .card-header { display: flex; flex-direction: column; gap: 0.2rem; }
  .address { font-weight: 700; font-size: 0.97rem; line-height: 1.3; }
  .zip { font-size: 0.78rem; color: #666; }
  .price { font-size: 1.6rem; font-weight: 800; color: #1a8a3a; line-height: 1; }
  .per-mo { font-size: 0.85rem; font-weight: 400; color: #555; }
  .specs { font-size: 0.82rem; color: #444; }
  .parking { font-size: 0.8rem; color: #555; display: flex; align-items: center; gap: 0.3rem; }
  .amenities { display: flex; flex-wrap: wrap; gap: 0.3rem; min-height: 0; }
  .amenity { background: #eef2ff; color: #3a4a9e; font-size: 0.7rem; padding: 0.2rem 0.55rem; border-radius: 20px; }
  .badge { position: absolute; top: 1rem; right: 1rem; font-size: 0.68rem; font-weight: 700; padding: 0.2rem 0.55rem; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.03em; }
  .badge.today { background: #d1fae5; color: #065f46; }
  .badge.yesterday { background: #fef3c7; color: #92400e; }
  .btn { display: block; text-align: center; background: #1a1a2e; color: #fff; text-decoration: none; padding: 0.65rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; margin-top: auto; transition: background 0.15s; }
  .btn:hover { background: #2d2d5e; }
  .empty-state { text-align: center; padding: 4rem 1rem; color: #666; }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty-sub { font-size: 0.85rem; color: #999; margin-top: 0.5rem; }
  .count-bar { color: #555; font-size: 0.9rem; margin-bottom: 1rem; }
  .count-bar strong { color: #1a1a2e; }
</style>
</head>
<body>
<header>
  <h1>SF Rentals &mdash; Fresh Listings</h1>
  <div class="timestamp">Last updated: 2026-04-03T19:02:44.171723+00:00 UTC</div>
  <div class="filter-bar">
    <span>&#x1F6CF; 1+ bed</span>
    <span>&#x1F4B0; $3,000&ndash;$4,000/mo</span>
    <span>&#x23F0; Listed in last 24hrs</span>
    <span>&#x274C; Excl. Nob Hill &middot; Tenderloin &middot; Mission &middot; SOMA</span>
  </div>
</header>
<main>
  <div class="count-bar">Showing <strong>0</strong> qualifying listings</div>
  <div class="grid">
    <div class="empty-state"><div class="empty-icon">&#x1F3E0;</div><p>No listings matched the current filters.</p><p class="empty-sub">Check back soon — listings refresh daily.</p></div>
  </div>
</main>
</body>
</html>
