<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Rentals - Fresh Listings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.4rem;
    }

    .timestamp {
      font-size: 0.85rem;
      color: #a0a8c0;
      margin-bottom: 1rem;
    }

    .filter-summary {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 0.4rem 1.1rem;
      font-size: 0.82rem;
      color: #d0d8f0;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .result-count {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 1.5rem;
      font-weight: 500;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 580px) {
      .grid { grid-template-columns: 1fr; }
      header h1 { font-size: 1.5rem; }
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.07);
    }

    .card-header {
      padding: 0.6rem 1rem;
      background: #f8f9fc;
      border-bottom: 1px solid #eef0f5;
    }

    .badge-today {
      display: inline-block;
      background: #16a34a;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .badge-yesterday {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .card-body {
      padding: 1.1rem 1.2rem;
      flex: 1;
    }

    .address {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.3;
      margin-bottom: 0.15rem;
    }

    .zipcode {
      font-size: 0.8rem;
      color: #777;
      margin-bottom: 0.75rem;
    }

    .price {
      font-size: 1.75rem;
      font-weight: 800;
      color: #16a34a;
      margin-bottom: 0.5rem;
      line-height: 1;
    }

    .meta {
      font-size: 0.85rem;
      color: #444;
      margin-bottom: 0.75rem;
    }

    .sep {
      margin: 0 0.4rem;
      color: #bbb;
    }

    .parking {
      font-size: 0.8rem;
      color: #555;
      background: #f0f7ff;
      border-radius: 6px;
      padding: 0.35rem 0.6rem;
      margin-bottom: 0.6rem;
      line-height: 1.4;
    }

    .parking .icon {
      margin-right: 0.25rem;
    }

    .amenities {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.5rem;
    }

    .tag {
      background: #f0f2f8;
      color: #333;
      font-size: 0.72rem;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-weight: 500;
    }

    .card-footer {
      padding: 0.9rem 1.2rem;
      border-top: 1px solid #eef0f5;
    }

    .btn {
      display: block;
      text-align: center;
      background: #1a1a2e;
      color: #fff;
      text-decoration: none;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.15s ease;
    }

    .btn:hover {
      background: #2d2d52;
    }

    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: #777;
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .empty-state h2 {
      font-size: 1.4rem;
      color: #333;
      margin-bottom: 0.75rem;
    }

    .empty-state p {
      font-size: 0.95rem;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <header>
    <h1>SF Rentals - Fresh Listings</h1>
    <div class="timestamp">Updated: 2026-04-09 20:22:08 UTC</div>
    <div class="filter-summary">1+ bed &nbsp;·&nbsp; $3,000–$4,000/mo &nbsp;·&nbsp; Listed in last 24hrs &nbsp;·&nbsp; Excl. Nob Hill, Tenderloin, Mission, SOMA</div>
  </header>
  <main>
    <div class="result-count">0 listings found</div>
    
    <div class="empty-state">
      <div class="empty-icon">🔍</div>
      <h2>No listings found</h2>
      <p>No SF rentals matched your criteria at this time.<br>
      Check back soon — new listings appear daily.</p>
    </div>
  </main>
</body>
</html>
