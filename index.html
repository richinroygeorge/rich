<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SF Rentals - Fresh Listings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
    }
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 24px 32px;
    }
    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header .timestamp {
      font-size: 0.8rem;
      color: #aab4d4;
      margin-top: 4px;
    }
    .filter-bar {
      background: #16213e;
      color: #c8d0e7;
      padding: 10px 32px;
      font-size: 0.85rem;
      letter-spacing: 0.2px;
    }
    .main {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 16px;
    }
    .count {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 20px;
      font-weight: 500;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 580px) {
      .grid { grid-template-columns: 1fr; }
      header { padding: 16px; }
    }
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.09);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .card:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.14);
    }
    .card-header {
      padding: 12px 16px 0;
    }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-today { background: #d4edda; color: #155724; }
    .badge-yesterday { background: #fff3cd; color: #856404; }
    .card-body {
      padding: 12px 16px;
      flex: 1;
    }
    .address {
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.3;
      margin-bottom: 2px;
    }
    .zip {
      font-size: 0.8rem;
      color: #777;
      margin-bottom: 10px;
    }
    .price {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1a8a3c;
      margin-bottom: 6px;
    }
    .meta {
      font-size: 0.82rem;
      color: #555;
      margin-bottom: 8px;
    }
    .parking {
      font-size: 0.78rem;
      color: #444;
      background: #f5f5f5;
      border-radius: 4px;
      padding: 5px 8px;
      margin-bottom: 6px;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }
    .parking .icon {
      background: #1a1a2e;
      color: #fff;
      border-radius: 3px;
      padding: 0 4px;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .amenities {
      font-size: 0.75rem;
      color: #666;
      font-style: italic;
    }
    .card-footer {
      padding: 12px 16px;
      border-top: 1px solid #f0f0f0;
    }
    .btn {
      display: inline-block;
      background: #1a1a2e;
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btn:hover { background: #2d2d5e; }
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: #777;
    }
    .empty p { margin-bottom: 8px; font-size: 1rem; }
    .empty p:first-child { font-size: 1.2rem; font-weight: 600; color: #444; }
  </style>
</head>
<body>
  <header>
    <h1>SF Rentals - Fresh Listings</h1>
    <p class="timestamp">Updated: 2026-03-28T16:09:11.343468+00:00 UTC</p>
  </header>
  <div class="filter-bar">
    1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA
  </div>
  <main class="main">
    <p class="count">0 listings found</p>
    <div class="grid">
      
    </div>
    <div class="empty"><p>No listings found matching your criteria at this time.</p><p>Check back soon — new listings are fetched every run.</p></div>
  </main>
</body>
</html>
