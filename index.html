<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
  }
  header {
    background: #1a1a2e;
    color: #fff;
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
  }
  header h1 {
    font-size: clamp(1.5rem, 4vw, 2.4rem);
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 0.4rem;
  }
  header .timestamp {
    font-size: 0.85rem;
    color: #a0a8c0;
    margin-bottom: 0.8rem;
  }
  .filter-bar {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    border-radius: 999px;
    padding: 0.4rem 1.2rem;
    font-size: 0.82rem;
    color: #c8d0e8;
    margin-top: 0.3rem;
  }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1rem 3rem;
  }
  .result-count {
    font-size: 0.9rem;
    color: #555;
    margin-bottom: 1.2rem;
    font-weight: 500;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.4rem;
  }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.09);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.14);
  }
  .card-img {
    width: 100%;
    height: 190px;
    object-fit: cover;
    display: block;
  }
  .card-body {
    padding: 1.1rem 1.2rem 1.3rem;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .card-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .badge {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0.25rem 0.65rem;
    border-radius: 999px;
  }
  .badge.today { background: #d1fae5; color: #065f46; }
  .badge.yesterday { background: #fef3c7; color: #92400e; }
  .price {
    font-size: 1.45rem;
    font-weight: 800;
    color: #16a34a;
  }
  .address {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 0.15rem;
  }
  .zipcode {
    font-size: 0.82rem;
    color: #777;
    margin-bottom: 0.6rem;
  }
  .specs {
    display: flex;
    gap: 0.8rem;
    font-size: 0.85rem;
    color: #444;
    margin-bottom: 0.7rem;
    flex-wrap: wrap;
  }
  .specs span {
    background: #f3f4f6;
    padding: 0.2rem 0.55rem;
    border-radius: 6px;
    font-weight: 500;
  }
  .parking {
    font-size: 0.82rem;
    color: #374151;
    margin-bottom: 0.55rem;
    line-height: 1.4;
  }
  .no-parking { color: #9ca3af; }
  .amenities {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-bottom: 0.85rem;
  }
  .amenities li {
    background: #eff6ff;
    color: #1d4ed8;
    font-size: 0.75rem;
    padding: 0.2rem 0.5rem;
    border-radius: 6px;
    font-weight: 500;
  }
  .btn {
    display: block;
    margin-top: auto;
    background: #1a1a2e;
    color: #fff;
    text-align: center;
    padding: 0.65rem 1rem;
    border-radius: 8px;
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 600;
    transition: background 0.15s;
  }
  .btn:hover { background: #2d2d5e; }
  .empty-state {
    text-align: center;
    padding: 5rem 1rem;
    color: #666;
  }
  .empty-state p { font-size: 1.15rem; margin-bottom: 0.6rem; }
  .empty-sub { font-size: 0.9rem; color: #999; }
</style>
</head>
<body>
<header>
  <h1>SF Rentals - Fresh Listings</h1>
  <p class="timestamp">Updated 2026-04-02 16:11 UTC</p>
  <span class="filter-bar">1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA</span>
</header>
<main>
  <p class="result-count">0 listings found</p>
  
    <div class="empty-state">
      <p>No listings found matching the current filters.</p>
      <p class="empty-sub">Check back soon — listings are updated frequently.</p>
    </div>
</main>
</body>
</html>
