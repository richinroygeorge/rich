<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Rentals - Fresh Listings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #222; }
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }
    header h1 { font-size: 1.9rem; font-weight: 700; letter-spacing: -0.5px; }
    header .timestamp { margin-top: 0.4rem; font-size: 0.85rem; opacity: 0.7; }
    .filter-bar {
      background: #16213e;
      color: #a0b4d6;
      text-align: center;
      padding: 0.65rem 1rem;
      font-size: 0.82rem;
      letter-spacing: 0.02em;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.4rem;
    }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.09);
      padding: 1.3rem 1.2rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.13); }
    .card-header { display: flex; align-items: center; justify-content: space-between; }
    .badge {
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
      padding: 0.2rem 0.55rem;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .price { font-size: 1.45rem; font-weight: 800; color: #27ae60; }
    .address { font-size: 1rem; font-weight: 700; line-height: 1.3; }
    .zip { font-size: 0.8rem; color: #888; }
    .details-row { font-size: 0.88rem; color: #555; }
    .parking { font-size: 0.8rem; color: #666; font-style: italic; }
    .tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.2rem; }
    .tag {
      font-size: 0.72rem;
      background: #eef4ff;
      color: #3a5bbf;
      border-radius: 6px;
      padding: 0.18rem 0.5rem;
      font-weight: 600;
    }
    .btn {
      display: inline-block;
      margin-top: 0.6rem;
      background: #1a1a2e;
      color: #fff;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      text-align: center;
      transition: background 0.15s;
    }
    .btn:hover { background: #2c2c54; }
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: #888;
      font-size: 1.05rem;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <header>
    <h1>SF Rentals - Fresh Listings</h1>
    <p class="timestamp">Updated: 2026-04-11T04:08:49.726166+00:00 UTC</p>
  </header>
  <div class="filter-bar">
    1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA
  </div>
  <div class="container">
    <div class="grid">

    <div class="empty-state">
      <p>No listings matched your filters right now.<br>
      Check back soon — new listings are fetched continuously.</p>
    </div>
    </div>
  </div>
</body>
</html>
