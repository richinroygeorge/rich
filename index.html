<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
  }

  header {
    background: #1a1a2e;
    color: #fff;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header .meta {
    font-size: 0.85rem;
    color: #a0a8c0;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
  }

  header .timestamp { opacity: 0.75; }

  .filter-bar {
    background: #252545;
    color: #c8d0e8;
    padding: 12px 32px;
    font-size: 0.82rem;
    letter-spacing: 0.02em;
  }

  .filter-bar span {
    display: inline-block;
    background: #3a3a6e;
    border-radius: 20px;
    padding: 3px 12px;
    margin: 2px 4px 2px 0;
  }

  main {
    padding: 28px 24px 48px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .count-line {
    font-size: 0.9rem;
    color: #555;
    margin-bottom: 20px;
    font-weight: 500;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.09);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.15); }

  .card-header {
    background: #1a1a2e;
    color: #fff;
    padding: 14px 16px 10px;
    position: relative;
  }

  .card-header .address {
    font-weight: 700;
    font-size: 1rem;
    line-height: 1.3;
    padding-right: 60px;
  }

  .card-header .zip {
    font-size: 0.78rem;
    color: #a0a8c0;
    margin-top: 3px;
  }

  .badge {
    position: absolute;
    top: 14px;
    right: 14px;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .badge.today { background: #22c55e; color: #fff; }
  .badge.yesterday { background: #f59e0b; color: #fff; }

  .card-body {
    padding: 14px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .price {
    font-size: 1.6rem;
    font-weight: 800;
    color: #16a34a;
    line-height: 1;
  }
  .price span { font-size: 0.9rem; font-weight: 500; color: #555; }

  .stats {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 0.85rem;
    color: #333;
  }
  .stats .stat { display: flex; align-items: center; gap: 4px; }
  .stat-icon { font-size: 0.95rem; }

  .info-row {
    font-size: 0.8rem;
    color: #555;
    background: #f8f9fc;
    border-radius: 6px;
    padding: 7px 10px;
    line-height: 1.5;
  }
  .info-row strong { color: #1a1a2e; }

  .amenities {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .amenity-tag {
    background: #eff6ff;
    color: #2563eb;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 0.74rem;
    font-weight: 500;
  }

  .card-footer {
    padding: 12px 16px;
    border-top: 1px solid #f0f0f0;
  }

  .btn-view {
    display: block;
    width: 100%;
    padding: 9px 0;
    background: #1a1a2e;
    color: #fff;
    text-align: center;
    text-decoration: none;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    transition: background 0.2s;
  }
  .btn-view:hover { background: #2e2e5e; }

  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: #666;
    grid-column: 1 / -1;
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
  .empty-state h2 { font-size: 1.3rem; margin-bottom: 8px; color: #333; }
  .empty-state p { font-size: 0.9rem; max-width: 420px; margin: 0 auto; line-height: 1.6; }

  footer {
    text-align: center;
    padding: 20px;
    font-size: 0.78rem;
    color: #aaa;
  }
</style>
</head>
<body>

<header>
  <h1>SF Rentals &mdash; Fresh Listings</h1>
  <div class="meta">
    <span class="timestamp" id="ts">Loading timestamp&hellip;</span>
  </div>
</header>

<div class="filter-bar">
  Active filters:
  <span>1+ bed</span>
  <span>$3,000 &ndash; $4,000/mo</span>
  <span>Listed in last 24 hrs</span>
  <span>Excl. Nob Hill</span>
  <span>Excl. Tenderloin</span>
  <span>Excl. Mission</span>
  <span>Excl. SOMA</span>
</div>

<main>
  <div class="count-line" id="count-line"></div>
  <div class="grid" id="grid"></div>
</main>

<footer>Data sourced via Zillow Scraper API &middot; Auto-updated</footer>

<script>
const DATA_TIMESTAMP = "2026-04-06T07:35:40.459471+00:00";
const LISTINGS = [];

function fmt(v, suffix) {
  if (v == null || v === '') return null;
  return v + (suffix || '');
}

function extractParking(desc) {
  if (!desc) return null;
  const m = desc.match(/parking[^.;,]{0,80}/i);
  return m ? m[0].trim() : null;
}

function extractAmenities(listing) {
  const tags = [];
  const facts = listing.details?.resoFacts || listing.details || {};
  if (facts.hasGarage || facts.garage) tags.push('Garage');
  if (facts.hasParking || facts.parking) tags.push('Parking');
  if (facts.petsAllowed || facts.petPolicy?.toLowerCase().includes('ok')) tags.push('Pets OK');
  if (facts.laundryFeatures) tags.push(facts.laundryFeatures.toString().split(',')[0]);
  if (facts.hasAC || facts.cooling) tags.push('A/C');
  if (facts.hasHeating || facts.heating) tags.push('Heat');
  const desc = (listing.description || '').toLowerCase();
  if (desc.includes('dishwasher')) tags.push('Dishwasher');
  if (desc.includes('balcon') || desc.includes('deck')) tags.push('Balcony/Deck');
  if (desc.includes('gym') || desc.includes('fitness')) tags.push('Gym');
  if (desc.includes('rooftop')) tags.push('Rooftop');
  if (desc.includes('doorman') || desc.includes('concierge')) tags.push('Doorman');
  return [...new Set(tags)].slice(0, 6);
}

function renderCard(l) {
  const days = l.days_on_zillow;
  const badgeClass = days === 0 ? 'today' : 'yesterday';
  const badgeText = days === 0 ? 'Today' : 'Yesterday';
  const beds = fmt(l.bedrooms, ' bd');
  const baths = fmt(l.bathrooms, ' ba');
  const sqft = l.livingArea ? l.livingArea.toLocaleString() + ' sqft' : null;
  const statsArr = [beds, baths, sqft].filter(Boolean);
  const parking = extractParking(l.description || (l.details && l.details.description));
  const amenities = extractAmenities(l);
  const zillow_url = l.detail_url || l.url || '#';
  const zipcode = l.zipcode || '';

  const statsHtml = statsArr.map(s => `<div class="stat">${s}</div>`).join('');
  const amenitiesHtml = amenities.length
    ? `<div class="amenities">${amenities.map(a => `<span class="amenity-tag">${a}</span>`).join('')}</div>`
    : '';
  const parkingHtml = parking
    ? `<div class="info-row"><strong>Parking:</strong> ${parking}</div>`
    : '';

  return `
  <div class="card">
    <div class="card-header">
      <div class="address">${l.address || 'Address not available'}</div>
      ${zipcode ? `<div class="zip">ZIP ${zipcode}</div>` : ''}
      <span class="badge ${badgeClass}">${badgeText}</span>
    </div>
    <div class="card-body">
      <div class="price">$${(l.price || 0).toLocaleString()}<span>/mo</span></div>
      ${statsArr.length ? `<div class="stats">${statsHtml}</div>` : ''}
      ${parkingHtml}
      ${amenitiesHtml}
    </div>
    <div class="card-footer">
      <a class="btn-view" href="${zillow_url}" target="_blank" rel="noopener">View on Zillow &rarr;</a>
    </div>
  </div>`;
}

document.addEventListener('DOMContentLoaded', () => {
  // Timestamp
  try {
    const ts = new Date(DATA_TIMESTAMP);
    document.getElementById('ts').textContent =
      'Data as of: ' + ts.toUTCString();
  } catch(e) {
    document.getElementById('ts').textContent = 'Data as of: ' + DATA_TIMESTAMP;
  }

  const grid = document.getElementById('grid');
  const countLine = document.getElementById('count-line');

  if (!LISTINGS || LISTINGS.length === 0) {
    countLine.textContent = '0 listings found matching filters';
    grid.innerHTML = `
      <div class="empty-state">
        <div class="icon">&#127968;</div>
        <h2>No listings found right now</h2>
        <p>No SF rentals matched all criteria (1+ bed, $3,000&ndash;$4,000/mo, listed in the last 24 hours, excluding Nob Hill, Tenderloin, Mission, and SOMA) at the time of the last data pull. Check back soon.</p>
      </div>`;
  } else {
    countLine.textContent = `${LISTINGS.length} listing${LISTINGS.length !== 1 ? 's' : ''} found`;
    grid.innerHTML = LISTINGS.map(renderCard).join('');
  }
});
</script>

<script>
// Inject server-side data
(function() {
  // Patch timestamp display immediately
  const raw = document.getElementById('ts');
  if (raw) raw.textContent = 'Data as of: ' + new Date(DATA_TIMESTAMP).toUTCString();
})();
</script>

</body>
</html>
