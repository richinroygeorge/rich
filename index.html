<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #222; }
  header { background: #1a1a2e; color: #fff; padding: 1.5rem 2rem; }
  header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
  .ts { font-size: 0.8rem; color: #a0a8c0; margin-top: 0.25rem; }
  .filter-bar { background: #16213e; color: #c8d0e7; font-size: 0.82rem; padding: 0.6rem 2rem; letter-spacing: 0.02em; }
  main { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); padding: 1.25rem; display: flex; flex-direction: column; gap: 0.6rem; }
  .card-header { display: flex; flex-direction: column; gap: 0.25rem; }
  .badge { display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 0.2em 0.6em; border-radius: 4px; text-transform: uppercase; width: fit-content; margin-bottom: 0.2rem; }
  .badge.today { background: #d4edda; color: #155724; }
  .badge.yesterday { background: #fff3cd; color: #856404; }
  .address { font-weight: 700; font-size: 1rem; line-height: 1.3; }
  .zip { font-size: 0.8rem; color: #666; }
  .price { font-size: 1.5rem; font-weight: 800; color: #1a7f3c; }
  .details { display: flex; gap: 0.75rem; font-size: 0.85rem; color: #444; flex-wrap: wrap; }
  .parking { font-size: 0.82rem; color: #555; }
  .amenities { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .amenity { background: #eef2ff; color: #3730a3; font-size: 0.72rem; padding: 0.2em 0.55em; border-radius: 4px; }
  .btn { display: block; background: #1a1a2e; color: #fff; text-align: center; padding: 0.6rem; border-radius: 7px; text-decoration: none; font-size: 0.88rem; font-weight: 600; margin-top: auto; transition: background 0.15s; }
  .btn:hover { background: #2d2d5e; }
  .empty { grid-column: 1/-1; text-align: center; padding: 3rem; color: #666; font-size: 1.1rem; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .count { color: #888; font-size: 0.9rem; margin-bottom: 1rem; }
</style>
</head>
<body>
<header>
  <h1>SF Rentals - Fresh Listings</h1>
  <div class="ts">Updated: 2026-03-27T16:15:48.825336+00:00 UTC</div>
</header>
<div class="filter-bar">1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA</div>
<main>
  <p class="count">0 listings found</p>
  <div class="grid">
    <div class="empty">No listings found matching your criteria at this time. Check back soon!</div>
  </div>
</main>
</body>
</html>
