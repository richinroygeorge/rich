<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; }
  header { background: #1a1a2e; color: #fff; padding: 2rem 1.5rem 1.5rem; }
  header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.4rem; }
  .timestamp { font-size: 0.82rem; color: #a0a8c0; margin-bottom: 0.8rem; }
  .filter-summary { display: inline-block; background: rgba(255,255,255,0.1); border-radius: 999px; padding: 0.35rem 1rem; font-size: 0.82rem; color: #c8cfe8; }
  main { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); padding: 1.2rem 1.3rem 1.4rem; display: flex; flex-direction: column; gap: 0.6rem; }
  .card-header { position: relative; }
  .badge { display: inline-block; font-size: 0.72rem; font-weight: 700; color: #fff; border-radius: 999px; padding: 0.2rem 0.65rem; margin-bottom: 0.45rem; letter-spacing: 0.04em; text-transform: uppercase; }
  .address { font-weight: 700; font-size: 1rem; line-height: 1.3; }
  .zip { font-size: 0.82rem; color: #777; margin-top: 0.15rem; }
  .price { font-size: 1.55rem; font-weight: 800; color: #1a9e5c; }
  .details { display: flex; gap: 0.75rem; flex-wrap: wrap; font-size: 0.85rem; color: #444; }
  .details span { background: #f0f4f8; border-radius: 6px; padding: 0.2rem 0.55rem; }
  .parking { font-size: 0.8rem; color: #555; background: #f9f9e8; border-radius: 6px; padding: 0.35rem 0.6rem; }
  .amenities { font-size: 0.78rem; color: #666; border-top: 1px solid #eee; padding-top: 0.5rem; }
  .btn { display: block; text-align: center; background: #1a1a2e; color: #fff; text-decoration: none; border-radius: 8px; padding: 0.65rem; font-size: 0.9rem; font-weight: 600; margin-top: auto; transition: background 0.2s; }
  .btn:hover { background: #2d2d5e; }
  .empty-state { text-align: center; padding: 4rem 1rem; color: #666; grid-column: 1 / -1; }
  .empty-state p { margin-bottom: 0.75rem; font-size: 1.05rem; }
  .count { font-size: 0.9rem; color: #aaa; margin-bottom: 1.2rem; }
</style>
</head>
<body>
<header>
  <h1>SF Rentals - Fresh Listings</h1>
  <div class="timestamp">Updated: 2026-03-29T16:02:46.324410+00:00 UTC</div>
  <span class="filter-summary">1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA</span>
</header>
<main>
  <p class="count">0 listings found</p>
  <div class="grid">
    <div class="empty-state"><p>No listings found matching your criteria at this time.</p><p>Check back soon — fresh listings are updated daily.</p></div>
  </div>
</main>
</body>
</html>
