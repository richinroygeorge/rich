<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Rentals - Fresh Listings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
    }
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1.5rem 2rem;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .timestamp {
      font-size: 0.8rem;
      color: #a0a8c0;
      margin-top: 0.3rem;
    }
    .filter-bar {
      background: #16213e;
      color: #c8d0e8;
      font-size: 0.82rem;
      padding: 0.6rem 2rem;
      border-top: 1px solid #2a2a4a;
    }
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }
    .count {
      font-size: 0.88rem;
      color: #666;
      margin-bottom: 1.2rem;
      font-weight: 500;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 580px) {
      .grid { grid-template-columns: 1fr; }
      header { padding: 1rem; }
      .filter-bar { padding: 0.6rem 1rem; }
    }
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 0 1px rgba(0,0,0,0.06);
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      transition: box-shadow 0.15s;
    }
    .card:hover {
      box-shadow: 0 6px 20px rgba(0,0,0,0.12), 0 0 1px rgba(0,0,0,0.08);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
    }
    .address {
      font-weight: 700;
      font-size: 0.97rem;
      color: #1a1a2e;
      line-height: 1.3;
    }
    .zip {
      font-size: 0.78rem;
      color: #888;
      margin-top: 0.15rem;
    }
    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.55rem;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge.today {
      background: #d4edda;
      color: #155724;
    }
    .badge.yesterday {
      background: #fff3cd;
      color: #856404;
    }
    .price {
      font-size: 1.7rem;
      font-weight: 800;
      color: #1a8a3a;
      line-height: 1;
    }
    .per-mo {
      font-size: 0.9rem;
      font-weight: 400;
      color: #666;
    }
    .meta {
      font-size: 0.85rem;
      color: #555;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .sep { color: #ccc; }
    .parking {
      font-size: 0.8rem;
      color: #555;
      background: #f8f9fa;
      border-radius: 6px;
      padding: 0.35rem 0.6rem;
    }
    .icon { margin-right: 0.3rem; }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .chip {
      font-size: 0.72rem;
      background: #eef2ff;
      color: #4338ca;
      border-radius: 20px;
      padding: 0.2rem 0.55rem;
      font-weight: 500;
    }
    .btn {
      display: inline-block;
      margin-top: auto;
      padding: 0.55rem 1rem;
      background: #1a1a2e;
      color: #fff;
      text-decoration: none;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
      transition: background 0.15s;
    }
    .btn:hover { background: #2d2d5e; }
    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: #888;
    }
    .empty-icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .empty h2 { font-size: 1.3rem; color: #555; margin-bottom: 0.6rem; }
    .empty p { font-size: 0.9rem; line-height: 1.6; }
  </style>
</head>
<body>
  <header>
    <h1>SF Rentals - Fresh Listings</h1>
    <div class="timestamp">Updated 2026-04-08 00:35:15 UTC</div>
  </header>
  <div class="filter-bar">
    1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA
  </div>
  <main class="main">
    <div class="count">0 listings found</div>
    
    <div class="empty">
      <div class="empty-icon">&#x1F3E0;</div>
      <h2>No listings found</h2>
      <p>No rentals matched your criteria right now.<br>Check back soon — this page refreshes automatically.</p>
    </div>
  </main>
</body>
</html>
