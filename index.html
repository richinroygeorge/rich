<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Rentals - Fresh Listings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 24px 32px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .timestamp {
      font-size: 0.82rem;
      color: #a0aec0;
    }

    .filter-bar {
      background: #16213e;
      color: #e2e8f0;
      padding: 12px 32px;
      font-size: 0.85rem;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .filter-bar .chip {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem;
    }

    .count-bar {
      padding: 18px 32px 4px;
      font-size: 0.9rem;
      color: #555;
      font-weight: 500;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 20px 32px 40px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; padding: 16px; }
      header { padding: 16px; }
      .filter-bar { padding: 10px 16px; }
      .count-bar { padding: 12px 16px 4px; }
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.09);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.13);
    }

    .card-header {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .address {
      font-weight: 700;
      font-size: 0.95rem;
      line-height: 1.3;
      color: #1a1a2e;
    }

    .zip {
      font-weight: 400;
      color: #666;
      font-size: 0.85rem;
    }

    .price {
      font-size: 1.8rem;
      font-weight: 800;
      color: #22863a;
      line-height: 1;
    }

    .per-mo {
      font-size: 0.95rem;
      font-weight: 400;
      color: #555;
    }

    .stats {
      display: flex;
      gap: 14px;
      font-size: 0.85rem;
      color: #444;
    }

    .stats span {
      background: #f0f4f8;
      border-radius: 6px;
      padding: 3px 8px;
      font-weight: 500;
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      width: fit-content;
    }

    .badge.today {
      background: #d4edda;
      color: #155724;
    }

    .badge.yesterday {
      background: #fff3cd;
      color: #856404;
    }

    .parking {
      font-size: 0.82rem;
      color: #555;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .parking .icon {
      background: #1a1a2e;
      color: #fff;
      border-radius: 4px;
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .amenities {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .amenity-tag {
      background: #eef2ff;
      color: #3730a3;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.72rem;
      font-weight: 500;
    }

    .card-footer {
      margin-top: auto;
      padding-top: 6px;
    }

    .btn {
      display: inline-block;
      background: #1a1a2e;
      color: #fff;
      text-decoration: none;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.15s;
      width: 100%;
      text-align: center;
    }

    .btn:hover {
      background: #2d2d5e;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #666;
    }

    .empty-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
    }

    .empty-state h2 {
      font-size: 1.4rem;
      margin-bottom: 10px;
      color: #333;
    }

    .empty-state p {
      font-size: 0.95rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <header>
    <h1>SF Rentals &mdash; Fresh Listings</h1>
    <div class="timestamp">Updated: 2026-03-28 00:10 UTC</div>
  </header>
  <div class="filter-bar">
    <span>Filters:</span>
    <span class="chip">1+ bed</span>
    <span class="chip">$3,000&ndash;$4,000/mo</span>
    <span class="chip">Listed in last 24hrs</span>
    <span class="chip">Excl. Nob Hill &middot; Tenderloin &middot; Mission &middot; SOMA</span>
  </div>
  <div class="count-bar">0 listings found</div>
  
    <div class="empty-state">
      <div class="empty-icon">&#x1F3E0;</div>
      <h2>No listings found</h2>
      <p>No SF rentals matched your criteria right now.<br>
         Check back soon — listings update continuously.</p>
    </div>
</body>
</html>
