<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; }
  header { background: #1a1a2e; color: #fff; padding: 24px 32px 20px; }
  header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.5px; }
  header .meta { margin-top: 8px; font-size: 0.85rem; opacity: 0.75; }
  .filter-bar { background: #16213e; color: #a8b4d0; font-size: 0.82rem; padding: 10px 32px; letter-spacing: 0.3px; }
  main { max-width: 1200px; margin: 32px auto; padding: 0 16px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); overflow: hidden; display: flex; flex-direction: column; }
  .card-body { padding: 18px 20px; flex: 1; }
  .card-footer { padding: 12px 20px; border-top: 1px solid #f0f0f0; }
  .badge { display: inline-block; font-size: 0.72rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-today { background: #e6f9ee; color: #1a8c45; }
  .badge-yesterday { background: #fff3e0; color: #d06000; }
  .address { font-weight: 700; font-size: 1rem; line-height: 1.35; margin-bottom: 3px; }
  .zip { font-size: 0.8rem; color: #888; margin-bottom: 10px; }
  .price { font-size: 1.6rem; font-weight: 800; color: #1a8c45; margin-bottom: 10px; }
  .specs { display: flex; gap: 14px; font-size: 0.82rem; color: #555; margin-bottom: 10px; flex-wrap: wrap; }
  .spec { display: flex; align-items: center; gap: 4px; }
  .parking { font-size: 0.8rem; color: #555; margin-bottom: 8px; }
  .amenities { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .amenity { background: #f0f4ff; color: #3a5bd9; font-size: 0.72rem; padding: 3px 8px; border-radius: 4px; }
  .btn { display: block; text-align: center; background: #1a1a2e; color: #fff; text-decoration: none; padding: 10px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; transition: background 0.15s; }
  .btn:hover { background: #2e2e5e; }
  .empty { text-align: center; padding: 80px 20px; color: #888; }
  .empty h2 { font-size: 1.4rem; margin-bottom: 10px; color: #555; }
  .empty p { font-size: 0.95rem; }
  .count-bar { font-size: 0.9rem; color: #666; margin-bottom: 18px; }
  .count-bar strong { color: #222; }
</style>
</head>
<body>
<header>
  <h1>SF Rentals &mdash; Fresh Listings</h1>
  <div class="meta" id="ts"></div>
</header>
<div class="filter-bar">
  1+ bed &nbsp;&middot;&nbsp; $3,000&ndash;$4,000/mo &nbsp;&middot;&nbsp; Listed in last 24hrs &nbsp;&middot;&nbsp; Excl. Nob Hill, Tenderloin, Mission, SOMA
</div>
<main>
  <div id="root"></div>
</main>
<script>
const DATA = {"listings":[],"timestamp":"2026-03-27T00:00:00+00:00"};

document.getElementById('ts').textContent = 'Updated: ' + new Date(DATA.timestamp).toUTCString();

const listings = DATA.listings || [];
const root = document.getElementById('root');

if (!listings.length) {
  root.innerHTML = `
    <div class="empty">
      <h2>No listings found right now</h2>
      <p>No SF rentals matched your filters (1+ bed, $3,000&ndash;$4,000/mo, listed within 24 hours,<br>excluding Nob Hill, Tenderloin, Mission, and SOMA). Check back soon.</p>
    </div>`;
} else {
  const countBar = document.createElement('div');
  countBar.className = 'count-bar';
  countBar.innerHTML = `<strong>${listings.length}</strong> listing${listings.length !== 1 ? 's' : ''} found`;
  root.appendChild(countBar);

  const grid = document.createElement('div');
  grid.className = 'grid';

  listings.forEach(l => {
    const days = l.days_on_zillow;
    const badgeClass = days === 0 ? 'badge-today' : 'badge-yesterday';
    const badgeText = days === 0 ? 'Today' : 'Yesterday';

    const det = l.details || {};
    const desc = (det.description || l.description || '').toLowerCase();
    let parking = '';
    if (desc.includes('garage')) parking = 'Garage parking';
    else if (desc.includes('parking')) parking = 'Parking available';
    else if (desc.includes('no parking')) parking = 'No parking';

    const amenityKeywords = [
      ['washer/dryer', 'W/D in unit'],['laundry','Laundry'],['dishwasher','Dishwasher'],
      ['hardwood','Hardwood floors'],['balcony','Balcony'],['deck','Deck'],
      ['yard','Yard'],['pet','Pets OK'],['gym','Gym'],['ac','A/C'],
      ['air conditioning','A/C'],['fireplace','Fireplace'],['storage','Storage'],
    ];
    const amenities = [];
    amenityKeywords.forEach(([kw, label]) => {
      if (desc.includes(kw) && !amenities.includes(label)) amenities.push(label);
    });

    const sqft = l.living_area ? `${l.living_area.toLocaleString()} sqft` : '';
    const baths = l.bathrooms ? `${l.bathrooms} ba` : '';
    const beds = l.bedrooms ? `${l.bedrooms} bd` : '';
    const zip = l.zipcode ? `SF, CA ${l.zipcode}` : 'San Francisco, CA';
    const url = l.detail_url || l.url || '#';

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-body">
        <span class="badge ${badgeClass}">${badgeText}</span>
        <div class="address">${l.address || 'Address unavailable'}</div>
        <div class="zip">${zip}</div>
        <div class="price">$${(l.price || 0).toLocaleString()}/mo</div>
        <div class="specs">
          ${beds ? `<span class="spec">${beds}</span>` : ''}
          ${baths ? `<span class="spec">${baths}</span>` : ''}
          ${sqft ? `<span class="spec">${sqft}</span>` : ''}
        </div>
        ${parking ? `<div class="parking">&#x1F697; ${parking}</div>` : ''}
        ${amenities.length ? `<div class="amenities">${amenities.slice(0,6).map(a=>`<span class="amenity">${a}</span>`).join('')}</div>` : ''}
      </div>
      <div class="card-footer">
        <a class="btn" href="${url}" target="_blank" rel="noopener">View on Zillow &rarr;</a>
      </div>`;
    grid.appendChild(card);
  });

  root.appendChild(grid);
}
</script>
</body>
</html>
