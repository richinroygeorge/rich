<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SF Rentals - Fresh Listings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 24px 32px;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header .meta {
      margin-top: 6px;
      font-size: 0.85rem;
      opacity: 0.7;
    }

    .filter-bar {
      background: #16213e;
      color: #a8b4d8;
      padding: 10px 32px;
      font-size: 0.82rem;
      letter-spacing: 0.2px;
    }

    main {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 580px) {
      .grid { grid-template-columns: 1fr; }
      header { padding: 18px 16px; }
      .filter-bar { padding: 10px 16px; }
      main { padding: 0 12px; }
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.09);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.13);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .address {
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.3;
      flex: 1;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-today { background: #d1fae5; color: #065f46; }
    .badge-yesterday { background: #fef3c7; color: #92400e; }

    .zip {
      font-size: 0.8rem;
      color: #666;
    }

    .price {
      font-size: 1.6rem;
      font-weight: 800;
      color: #16a34a;
    }

    .details {
      font-size: 0.85rem;
      color: #555;
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
    }

    .details span {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .amenities {
      font-size: 0.78rem;
      color: #777;
      border-top: 1px solid #eee;
      padding-top: 8px;
      line-height: 1.5;
    }

    .parking {
      font-size: 0.8rem;
      color: #444;
      background: #f8f9fa;
      padding: 5px 9px;
      border-radius: 5px;
      border-left: 3px solid #1a1a2e;
    }

    .btn-zillow {
      display: block;
      text-align: center;
      background: #006aff;
      color: #fff;
      text-decoration: none;
      padding: 9px 14px;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-top: auto;
      transition: background 0.15s;
    }

    .btn-zillow:hover { background: #0051cc; }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 20px;
      color: #666;
    }

    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .empty-state h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 0.9rem;
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .count-bar {
      margin-bottom: 18px;
      font-size: 0.9rem;
      color: #555;
      font-weight: 500;
    }
  </style>
</head>
<body>

<header>
  <h1>SF Rentals &mdash; Fresh Listings</h1>
  <div class="meta">Last updated: 2026-04-07T10:17:18+00:00 UTC</div>
</header>

<div class="filter-bar">
  1+ bed &nbsp;&middot;&nbsp; $3,000&ndash;$4,000/mo &nbsp;&middot;&nbsp; Listed in last 24hrs &nbsp;&middot;&nbsp; Excl. Nob Hill, Tenderloin, Mission, SOMA
</div>

<main>
  <div class="count-bar" id="count-bar"></div>
  <div class="grid" id="listings-grid"></div>
</main>

<script>
  const data = {"listings":[],"timestamp":"2026-04-07T10:17:18.409764+00:00"};

  function parkingFromDesc(desc) {
    if (!desc) return null;
    const m = desc.match(/parking[^.;,\n]{0,80}/i);
    return m ? m[0].trim() : null;
  }

  function amenitiesList(details) {
    if (!details) return [];
    const items = [];
    const facts = details.homeFacts || details.resoFacts || {};
    const raw = [
      facts.laundry, facts.petPolicy, facts.cooling, facts.heating,
      facts.parkingFeatures, facts.hasGarage ? 'Garage' : null,
      facts.hasPool ? 'Pool' : null, facts.hasSpa ? 'Spa' : null,
    ];
    raw.forEach(v => {
      if (!v) return;
      if (Array.isArray(v)) v.forEach(x => x && items.push(x));
      else items.push(String(v));
    });
    return items.filter(Boolean).slice(0, 6);
  }

  const listings = data.listings || [];
  const grid = document.getElementById('listings-grid');
  const countBar = document.getElementById('count-bar');

  countBar.textContent = listings.length
    ? `${listings.length} listing${listings.length !== 1 ? 's' : ''} found`
    : '';

  if (listings.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="icon">&#127968;</div>
        <h2>No listings found right now</h2>
        <p>No SF rentals matched your criteria (1+ bed, $3,000&ndash;$4,000/mo, listed in the last 24 hours, excluding Nob Hill, Tenderloin, Mission &amp; SOMA). Check back soon &mdash; new listings are fetched continuously.</p>
      </div>`;
  } else {
    listings.forEach(l => {
      const details = l.details || {};
      const desc = details.description || l.description || '';
      const parking = parkingFromDesc(desc);
      const amenities = amenitiesList(details);
      const days = l.days_on_zillow;
      const badge = days === 0
        ? '<span class="badge badge-today">Today</span>'
        : '<span class="badge badge-yesterday">Yesterday</span>';
      const sqft = l.living_area || details.livingArea || '';
      const baths = l.bathrooms || details.bathrooms || '';
      const zipcode = l.zipcode || (l.address || '').match(/\b9\d{4}\b/)?.[0] || '';
      const url = l.detail_url
        ? (l.detail_url.startsWith('http') ? l.detail_url : 'https://www.zillow.com' + l.detail_url)
        : `https://www.zillow.com/homedetails/${l.zpid}_zpid/`;

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-header">
          <div class="address">${l.address || 'Address unavailable'}</div>
          ${badge}
        </div>
        <div class="zip">${zipcode ? 'ZIP ' + zipcode : ''}</div>
        <div class="price">$${Number(l.price).toLocaleString()}/mo</div>
        <div class="details">
          <span>&#127968; ${l.bedrooms} bed${l.bedrooms !== 1 ? 's' : ''}</span>
          ${baths ? `<span>&#127946; ${baths} bath${baths !== 1 ? 's' : ''}</span>` : ''}
          ${sqft ? `<span>&#9632; ${Number(sqft).toLocaleString()} sqft</span>` : ''}
        </div>
        ${parking ? `<div class="parking">&#128663; ${parking}</div>` : ''}
        ${amenities.length ? `<div class="amenities">${amenities.join(' &nbsp;&middot;&nbsp; ')}</div>` : ''}
        <a class="btn-zillow" href="${url}" target="_blank" rel="noopener">View on Zillow &rarr;</a>
      `;
      grid.appendChild(card);
    });
  }
</script>

</body>
</html>
