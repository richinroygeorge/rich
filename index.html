<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
  header { background: #1a1a2e; color: #fff; padding: 24px 32px; }
  header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.5px; }
  header .meta { margin-top: 8px; font-size: 0.85rem; color: #a0aec0; }
  header .meta .filters { margin-top: 4px; color: #90cdf4; font-size: 0.82rem; }
  main { max-width: 1200px; margin: 32px auto; padding: 0 16px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .card-header { position: relative; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; color: #fff; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .address { font-weight: 700; font-size: 1rem; line-height: 1.3; }
  .zip { font-size: 0.82rem; color: #888; margin-top: 2px; }
  .price { color: #27ae60; font-size: 1.6rem; font-weight: 800; }
  .details { display: flex; gap: 12px; font-size: 0.85rem; color: #555; flex-wrap: wrap; }
  .details span { background: #f7f7f7; padding: 3px 10px; border-radius: 20px; }
  .parking { font-size: 0.82rem; color: #555; background: #fffbea; border: 1px solid #f0e68c; padding: 6px 10px; border-radius: 6px; }
  .amenities { display: flex; flex-wrap: wrap; gap: 6px; }
  .amenity { background: #eef2ff; color: #4c6ef5; font-size: 0.75rem; padding: 2px 8px; border-radius: 20px; }
  .btn { display: block; text-align: center; background: #1a1a2e; color: #fff; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.9rem; margin-top: auto; transition: background 0.2s; }
  .btn:hover { background: #2d2d52; }
  .empty { text-align: center; padding: 64px 24px; font-size: 1.1rem; color: #888; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
</style>
</head>
<body>
<header>
  <h1>SF Rentals - Fresh Listings</h1>
  <div class="meta">
    <div>Last updated: 2026-03-29T17:05:41.518277+00:00 UTC</div>
    <div class="filters">1+ bed &middot; $3,000-$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA</div>
  </div>
</header>
<main>
  <div class="empty">No listings matched the current filters. Check back soon — this page refreshes with each run.</div>
</main>
</body>
</html>
