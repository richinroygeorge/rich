<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #333; }
  header { background: #1a1a2e; color: #fff; padding: 2rem 1.5rem; }
  header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
  header .meta { margin-top: 0.5rem; font-size: 0.85rem; opacity: 0.75; }
  header .filters { margin-top: 0.75rem; font-size: 0.8rem; background: rgba(255,255,255,0.1); display: inline-block; padding: 0.4rem 0.8rem; border-radius: 20px; }
  main { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; display: flex; flex-direction: column; }
  .card-header { padding: 1rem 1rem 0.5rem; position: relative; }
  .badge { font-size: 0.7rem; font-weight: 700; color: #fff; padding: 0.2rem 0.6rem; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
  .address { font-size: 0.95rem; font-weight: 700; margin-top: 0.5rem; line-height: 1.3; }
  .zip { font-size: 0.78rem; color: #888; margin-top: 0.15rem; }
  .card-body { padding: 0.75rem 1rem; flex: 1; }
  .price { font-size: 1.5rem; font-weight: 800; color: #27ae60; margin-bottom: 0.5rem; }
  .stats { display: flex; gap: 0.75rem; font-size: 0.82rem; color: #555; flex-wrap: wrap; }
  .parking { font-size: 0.8rem; color: #444; margin-top: 0.5rem; }
  .tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.6rem; }
  .tag { background: #eef2ff; color: #3b4fd4; font-size: 0.72rem; padding: 0.2rem 0.55rem; border-radius: 12px; }
  .card-footer { padding: 0.75rem 1rem 1rem; }
  .btn { display: block; text-align: center; background: #1a1a2e; color: #fff; text-decoration: none; padding: 0.6rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; transition: background 0.2s; }
  .btn:hover { background: #2d2d5e; }
  .empty { text-align: center; padding: 4rem 2rem; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); color: #666; font-size: 1rem; }
</style>
</head>
<body>
<header>
  <h1>SF Rentals - Fresh Listings</h1>
  <p class="meta">Last updated: 2026-04-10T07:32:48.667330+00:00 UTC</p>
  <p class="filters">1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA</p>
</header>
<main>
  <div class="empty"><p>No listings matched your criteria at this time. Check back soon.</p></div>
</main>
</body>
</html>
