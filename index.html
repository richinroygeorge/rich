<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    color: #222;
    min-height: 100vh;
  }
  header {
    background: #1a1a2e;
    color: #fff;
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
  }
  header h1 {
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 0.4rem;
  }
  header .timestamp {
    font-size: 0.85rem;
    color: #a0a8c8;
    margin-bottom: 0.8rem;
  }
  .filter-bar {
    display: inline-block;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 0.45rem 1rem;
    font-size: 0.82rem;
    color: #c8d0e8;
  }
  .count-bar {
    text-align: center;
    padding: 1.2rem 1rem 0.5rem;
    font-size: 0.9rem;
    color: #555;
    font-weight: 500;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.25rem;
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem 1.5rem 3rem;
  }
  @media (max-width: 900px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 580px) {
    .grid { grid-template-columns: 1fr; padding: 1rem; }
  }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.09);
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.14); }
  .card-header { display: flex; flex-direction: column; gap: 0.3rem; }
  .badge {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-radius: 4px;
    padding: 0.18rem 0.55rem;
    width: fit-content;
  }
  .badge.today { background: #dcfce7; color: #166534; }
  .badge.yesterday { background: #fef9c3; color: #854d0e; }
  .address {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.3;
    color: #1a1a2e;
  }
  .zip { font-size: 0.82rem; color: #666; }
  .price {
    font-size: 1.6rem;
    font-weight: 800;
    color: #16a34a;
    letter-spacing: -0.5px;
  }
  .details-row {
    display: flex;
    gap: 0.9rem;
    font-size: 0.88rem;
    color: #444;
    flex-wrap: wrap;
  }
  .details-row span {
    background: #f1f5f9;
    border-radius: 5px;
    padding: 0.2rem 0.55rem;
    font-weight: 500;
  }
  .parking {
    font-size: 0.83rem;
    color: #555;
    background: #fafafa;
    border-left: 3px solid #d1d5db;
    padding: 0.3rem 0.6rem;
    border-radius: 0 5px 5px 0;
  }
  .amenities {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .tag {
    font-size: 0.75rem;
    background: #eff6ff;
    color: #1d4ed8;
    border-radius: 4px;
    padding: 0.18rem 0.5rem;
    font-weight: 500;
  }
  .btn {
    display: block;
    text-align: center;
    background: #1a1a2e;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    padding: 0.65rem 1rem;
    font-size: 0.88rem;
    font-weight: 600;
    margin-top: auto;
    transition: background 0.2s;
  }
  .btn:hover { background: #2d2d52; }
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: #666;
    max-width: 500px;
    margin: 0 auto;
  }
  .empty-icon { font-size: 3.5rem; margin-bottom: 1rem; }
  .empty-state h2 { font-size: 1.5rem; color: #333; margin-bottom: 0.75rem; }
  .empty-state p { font-size: 0.95rem; line-height: 1.6; }
</style>
</head>
<body>
<header>
  <h1>SF Rentals - Fresh Listings</h1>
  <div class="timestamp">Updated 2026-03-30 23:23 UTC</div>
  <div class="filter-bar">1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA</div>
</header>
<div class="count-bar">0 listings found</div>
<div class="grid">
  
</div>

<div class="empty-state">
  <div class="empty-icon">🏠</div>
  <h2>No listings found</h2>
  <p>No qualifying rentals matched the filters at this time. Check back soon — listings are refreshed regularly.</p>
</div>
</body>
</html>
