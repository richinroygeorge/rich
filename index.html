<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #222; }
  header { background: #1a1a2e; color: #fff; padding: 24px 32px; }
  header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: .5px; }
  header .meta { margin-top: 6px; font-size: .85rem; opacity: .75; }
  .filter-bar { background: #16213e; color: #a8b4c8; font-size: .82rem; padding: 10px 32px; letter-spacing: .3px; }
  .container { max-width: 1200px; margin: 32px auto; padding: 0 16px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,.09); display: flex; flex-direction: column; gap: 10px; }
  .card-top { display: flex; flex-direction: column; gap: 4px; }
  .badge { display: inline-block; font-size: .72rem; font-weight: 700; padding: 2px 8px; border-radius: 12px; width: fit-content; margin-bottom: 4px; }
  .badge.today { background: #d4edda; color: #155724; }
  .badge.yesterday { background: #fff3cd; color: #856404; }
  .address { font-weight: 700; font-size: 1rem; line-height: 1.3; }
  .zip { font-size: .82rem; color: #666; }
  .price { font-size: 1.5rem; font-weight: 800; color: #2e7d32; }
  .details { display: flex; gap: 12px; font-size: .85rem; color: #444; }
  .parking { font-size: .82rem; color: #555; }
  .amenities { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { background: #e8f0fe; color: #1a73e8; font-size: .75rem; padding: 2px 8px; border-radius: 10px; }
  .btn { display: block; text-align: center; margin-top: auto; padding: 10px; background: #1a73e8; color: #fff; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: .9rem; transition: background .2s; }
  .btn:hover { background: #1558b0; }
  .empty { text-align: center; padding: 60px 20px; font-size: 1.1rem; color: #666; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
  .count { font-size: .9rem; color: #555; margin-bottom: 18px; }
</style>
</head>
<body>
<header>
  <h1>SF Rentals &mdash; Fresh Listings</h1>
  <div class="meta">Last updated: 2026-04-03T06:26:46.627861+00:00 UTC</div>
</header>
<div class="filter-bar">
  1+ bed &nbsp;&middot;&nbsp; $3,000&ndash;$4,000/mo &nbsp;&middot;&nbsp; Listed in last 24hrs &nbsp;&middot;&nbsp; Excl. Nob Hill, Tenderloin, Mission, SOMA
</div>
<div class="container">
  <p class="count">0 listings found</p>
  <div class="grid">
    <div class="empty">No listings matched the current filters. Check back soon.</div>
  </div>
</div>
</body>
</html>
