<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; }
  header { background: #1a1a2e; color: #fff; padding: 24px 32px 20px; }
  header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.5px; }
  header .meta { margin-top: 6px; font-size: 0.85rem; color: #a0a8c8; }
  header .filters { margin-top: 10px; background: rgba(255,255,255,0.08); border-radius: 6px; padding: 8px 14px; font-size: 0.82rem; color: #c8cfea; display: inline-block; }
  .container { max-width: 1200px; margin: 0 auto; padding: 28px 20px; }
  .count-bar { font-size: 0.92rem; color: #555; margin-bottom: 18px; font-weight: 500; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); overflow: hidden; display: flex; flex-direction: column; transition: transform 0.15s, box-shadow 0.15s; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(0,0,0,0.13); }
  .card-body { padding: 18px 18px 14px; flex: 1; }
  .badge { display: inline-block; font-size: 0.72rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-today { background: #e6f9f0; color: #1a7a4a; }
  .badge-yesterday { background: #fff3e0; color: #b35c00; }
  .address { font-size: 1.0rem; font-weight: 700; line-height: 1.35; color: #1a1a2e; }
  .zipcode { font-size: 0.8rem; color: #888; margin-top: 2px; }
  .price { font-size: 1.55rem; font-weight: 800; color: #1a9e5c; margin: 10px 0 8px; }
  .details { display: flex; gap: 14px; flex-wrap: wrap; font-size: 0.83rem; color: #555; margin-bottom: 10px; }
  .details span { display: flex; align-items: center; gap: 4px; }
  .amenities { font-size: 0.78rem; color: #666; line-height: 1.5; margin-top: 6px; }
  .amenities strong { color: #444; }
  .card-footer { padding: 12px 18px; border-top: 1px solid #f0f0f0; }
  .btn { display: block; text-align: center; background: #1a1a2e; color: #fff; text-decoration: none; padding: 9px 0; border-radius: 7px; font-size: 0.88rem; font-weight: 600; letter-spacing: 0.2px; transition: background 0.15s; }
  .btn:hover { background: #2e2e52; }
  .empty-state { text-align: center; padding: 60px 20px; color: #888; }
  .empty-state h2 { font-size: 1.3rem; margin-bottom: 10px; color: #555; }
  .empty-state p { font-size: 0.92rem; max-width: 440px; margin: 0 auto; line-height: 1.6; }
  .error-note { background: #fff3cd; border-left: 4px solid #ffc107; padding: 10px 16px; border-radius: 4px; font-size: 0.85rem; color: #856404; margin-bottom: 20px; }
</style>
</head>
<body>

<header>
  <h1>SF Rentals &mdash; Fresh Listings</h1>
  <div class="meta">Last updated: 2026-04-02T08:25:41+00:00 UTC</div>
  <div class="filters">1+ bed &nbsp;&middot;&nbsp; $3,000&ndash;$4,000/mo &nbsp;&middot;&nbsp; Listed in last 24hrs &nbsp;&middot;&nbsp; Excl. Nob Hill, Tenderloin, Mission, SOMA</div>
</header>

<div class="container">

  <div id="main-content">
    <!-- Content injected by script below -->
  </div>

</div>

<script>
(function() {
  const listings = [];
  const fetchError = "Network unavailable: proxy blocked outbound HTTPS";
  const container = document.getElementById('main-content');

  if (fetchError) {
    const errDiv = document.createElement('div');
    errDiv.className = 'error-note';
    errDiv.textContent = 'Data fetch error: ' + fetchError + '. Listings could not be retrieved at this time.';
    container.appendChild(errDiv);
  }

  const countBar = document.createElement('div');
  countBar.className = 'count-bar';
  countBar.textContent = listings.length + ' listing' + (listings.length !== 1 ? 's' : '') + ' found';
  container.appendChild(countBar);

  if (listings.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = '<h2>No listings found</h2><p>No qualifying rentals were found matching your criteria (1+ bed, $3,000&ndash;$4,000/mo, listed in the last 24 hours, excluding Nob Hill, Tenderloin, Mission, and SOMA). Check back soon &mdash; new listings are checked regularly.</p>';
    container.appendChild(empty);
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'grid';

  listings.forEach(function(l) {
    const days = l.days_on_zillow;
    const badgeClass = days === 0 ? 'badge-today' : 'badge-yesterday';
    const badgeText = days === 0 ? 'Today' : 'Yesterday';
    const baths = l.bathrooms != null ? l.bathrooms + ' ba' : '';
    const sqft = l.living_area ? l.living_area.toLocaleString() + ' sqft' : '';
    const beds = l.bedrooms != null ? l.bedrooms + ' bd' : '';
    const zip = l.zipcode ? 'ZIP ' + l.zipcode : '';

    // Extract parking from description
    let parking = '';
    const desc = (l.description || '') + (l.details ? JSON.stringify(l.details) : '');
    if (/parking/i.test(desc)) {
      const m = desc.match(/([^\.\n]{0,60}parking[^\.\n]{0,60})/i);
      if (m) parking = m[1].trim().replace(/\s+/g, ' ');
    }

    // Amenities
    const amenityKeys = ['laundry', 'dishwasher', 'gym', 'pool', 'pet', 'hardwood', 'balcony', 'patio', 'ac', 'air conditioning', 'elevator', 'garage'];
    const found = amenityKeys.filter(k => new RegExp(k, 'i').test(desc));
    const amenitiesStr = found.length ? found.map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(', ') : '';

    const zillowUrl = l.detail_url || ('https://www.zillow.com' + (l.hdpUrl || ''));

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="card-body">' +
        '<span class="badge ' + badgeClass + '">' + badgeText + '</span>' +
        '<div class="address">' + (l.address || 'Address unavailable') + '</div>' +
        (zip ? '<div class="zipcode">' + zip + '</div>' : '') +
        '<div class="price">$' + Number(l.price).toLocaleString() + '/mo</div>' +
        '<div class="details">' +
          (beds ? '<span>&#127968; ' + beds + '</span>' : '') +
          (baths ? '<span>&#128701; ' + baths + '</span>' : '') +
          (sqft ? '<span>&#9634; ' + sqft + '</span>' : '') +
        '</div>' +
        (parking ? '<div class="amenities"><strong>Parking:</strong> ' + parking + '</div>' : '') +
        (amenitiesStr ? '<div class="amenities"><strong>Amenities:</strong> ' + amenitiesStr + '</div>' : '') +
      '</div>' +
      '<div class="card-footer">' +
        '<a class="btn" href="' + zillowUrl + '" target="_blank" rel="noopener">View on Zillow &rarr;</a>' +
      '</div>';

    grid.appendChild(card);
  });

  container.appendChild(grid);
})();
</script>

</body>
</html>
