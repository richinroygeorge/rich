<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #222; }
  header { background: #1a1a2e; color: #fff; padding: 28px 24px 20px; }
  header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
  .timestamp { font-size: 0.78rem; color: #a0a8c0; margin-top: 4px; }
  .filter-bar { background: #16213e; color: #c9d1e9; font-size: 0.82rem; padding: 10px 24px; letter-spacing: 0.2px; }
  main { max-width: 1200px; margin: 32px auto; padding: 0 16px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); overflow: hidden; display: flex; flex-direction: column; }
  .card-header { padding: 16px 16px 8px; }
  .address { font-weight: 700; font-size: 1rem; margin-top: 6px; line-height: 1.3; }
  .zipcode { color: #666; font-size: 0.82rem; margin-top: 2px; }
  .price { font-size: 1.6rem; font-weight: 800; color: #1a9e4a; padding: 4px 16px 8px; }
  .details-row { display: flex; gap: 12px; padding: 0 16px 10px; font-size: 0.85rem; color: #444; flex-wrap: wrap; }
  .details-row span { background: #f0f2f5; border-radius: 4px; padding: 2px 8px; }
  .badge { display: inline-block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 20px; }
  .badge.today { background: #d4edda; color: #155724; }
  .badge.yesterday { background: #fff3cd; color: #856404; }
  .parking { padding: 4px 16px 6px; font-size: 0.82rem; color: #555; }
  .amenities { padding: 6px 16px 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .amenity-tag { background: #eef2ff; color: #3730a3; font-size: 0.72rem; padding: 2px 7px; border-radius: 4px; }
  .card-footer { margin-top: auto; padding: 12px 16px 16px; }
  .btn { display: inline-block; background: #1a1a2e; color: #fff; text-decoration: none; padding: 9px 18px; border-radius: 7px; font-size: 0.85rem; font-weight: 600; transition: background 0.2s; }
  .btn:hover { background: #2d2d5e; }
  .empty-state { text-align: center; padding: 64px 24px; color: #666; font-size: 1.05rem; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .count-bar { margin-bottom: 20px; font-size: 0.9rem; color: #555; }
  .count-bar strong { color: #1a1a2e; }
</style>
</head>
<body>
<header>
  <h1>SF Rentals &mdash; Fresh Listings</h1>
  <div class="timestamp">Updated: 2026-04-07T17:07:57.857219+00:00 UTC</div>
</header>
<div class="filter-bar">1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA</div>
<main>
  <div class="count-bar">Showing <strong>0</strong> qualifying listings</div>
  <div class="grid">
    <div class="empty-state"><p>No listings found matching the current filters. Check back soon!</p></div>
  </div>
</main>
</body>
</html>
