<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #222; }
  header { background: #1a1a2e; color: #fff; padding: 2rem 1.5rem 1.5rem; }
  header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
  header .timestamp { margin-top: 0.3rem; font-size: 0.85rem; opacity: 0.7; }
  header .filter-summary { margin-top: 0.75rem; font-size: 0.9rem; background: rgba(255,255,255,0.1); display: inline-block; padding: 0.4rem 0.9rem; border-radius: 999px; }
  .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); padding: 1.25rem; display: flex; flex-direction: column; gap: 0.6rem; }
  .card-header { display: flex; flex-direction: column; gap: 0.3rem; }
  .badge { display: inline-block; font-size: 0.72rem; font-weight: 700; padding: 0.2rem 0.55rem; border-radius: 999px; width: fit-content; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge.today { background: #d4edda; color: #155724; }
  .badge.yesterday { background: #fff3cd; color: #856404; }
  .address { font-weight: 700; font-size: 1rem; line-height: 1.3; margin-top: 0.25rem; }
  .zip { font-size: 0.82rem; color: #777; }
  .price { font-size: 1.5rem; font-weight: 800; color: #1a8f3c; }
  .details { font-size: 0.88rem; color: #555; }
  .parking { font-size: 0.82rem; color: #444; background: #f8f8f8; padding: 0.35rem 0.6rem; border-radius: 6px; }
  .amenities { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .tag { font-size: 0.75rem; background: #eef2ff; color: #3730a3; padding: 0.2rem 0.5rem; border-radius: 6px; }
  .btn { display: block; text-align: center; margin-top: auto; padding: 0.65rem; background: #1a1a2e; color: #fff; text-decoration: none; border-radius: 8px; font-size: 0.88rem; font-weight: 600; transition: background 0.2s; }
  .btn:hover { background: #2d2d5e; }
  .empty { grid-column: 1/-1; text-align: center; padding: 3rem; color: #888; font-size: 1.05rem; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
</style>
</head>
<body>
<header>
  <h1>SF Rentals - Fresh Listings</h1>
  <div class="timestamp">Updated: 2026-03-30T23:23:33.417379+00:00 UTC</div>
  <div class="filter-summary">1+ bed &bull; $3,000-$4,000/mo &bull; Listed in last 24hrs &bull; Excl. Nob Hill, Tenderloin, Mission, SOMA</div>
</header>
<div class="container">
  <div class="grid">
    <div class="empty">No listings found matching your criteria at this time. Check back soon.</div>
  </div>
</div>
</body>
</html>
