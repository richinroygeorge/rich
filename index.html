<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SF Rentals - Fresh Listings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 24px 32px 20px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header .timestamp {
      font-size: 0.82rem;
      color: #a0aec0;
      margin-top: 4px;
    }

    .filter-bar {
      background: #16213e;
      color: #cbd5e0;
      padding: 10px 32px;
      font-size: 0.85rem;
      letter-spacing: 0.2px;
    }

    .filter-bar span {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 3px 11px;
      margin: 2px 4px 2px 0;
      font-size: 0.8rem;
    }

    main {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
      header { padding: 16px 20px 14px; }
      .filter-bar { padding: 10px 20px; }
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.09), 0 1px 3px rgba(0,0,0,0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.13);
    }

    .card-body {
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .address {
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.3;
      color: #1a1a2e;
    }

    .zipcode {
      font-size: 0.8rem;
      color: #718096;
      margin-top: 2px;
    }

    .badge {
      flex-shrink: 0;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .badge-today { background: #c6f6d5; color: #22543d; }
    .badge-yesterday { background: #fefcbf; color: #744210; }

    .price {
      font-size: 1.6rem;
      font-weight: 800;
      color: #276749;
    }

    .meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 0.83rem;
      color: #4a5568;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .meta-item svg {
      width: 14px;
      height: 14px;
      opacity: 0.6;
    }

    .amenities {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
    }

    .amenity-tag {
      background: #ebf4ff;
      color: #2b6cb0;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .parking-note {
      font-size: 0.8rem;
      color: #4a5568;
      background: #f7fafc;
      border-left: 3px solid #63b3ed;
      padding: 6px 10px;
      border-radius: 0 6px 6px 0;
    }

    .card-footer {
      padding: 14px 20px;
      border-top: 1px solid #f0f0f0;
    }

    .btn-zillow {
      display: block;
      text-align: center;
      background: #1a1a2e;
      color: #fff;
      text-decoration: none;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      transition: background 0.15s ease;
    }

    .btn-zillow:hover { background: #2d2d5e; }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #718096;
    }

    .empty-state .icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
      display: block;
    }

    .empty-state h2 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 0.9rem;
      max-width: 380px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .summary-bar {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>SF Rentals &mdash; Fresh Listings</h1>
  <div class="timestamp">Last updated: 2026-04-11T00:48:29Z UTC</div>
</header>

<div class="filter-bar">
  Filters active:
  <span>1+ bed</span>
  <span>$3,000 &ndash; $4,000/mo</span>
  <span>Listed in last 24 hrs</span>
  <span>Excl. Nob Hill</span>
  <span>Excl. Tenderloin</span>
  <span>Excl. Mission</span>
  <span>Excl. SOMA</span>
</div>

<main>
  <div id="app"></div>
</main>

<script>
  const listings = [];

  const app = document.getElementById('app');

  if (listings.length === 0) {
    app.innerHTML = `
      <div class="empty-state">
        <span class="icon">&#127968;</span>
        <h2>No qualifying listings right now</h2>
        <p>No San Francisco rentals matched all filters (1+ bed, $3,000&ndash;$4,000/mo, listed within 24 hrs, outside excluded neighborhoods) at the time of this update.</p>
      </div>`;
  } else {
    const countBar = document.createElement('div');
    countBar.className = 'summary-bar';
    countBar.textContent = `${listings.length} listing${listings.length !== 1 ? 's' : ''} found`;
    app.appendChild(countBar);

    const grid = document.createElement('div');
    grid.className = 'grid';

    listings.forEach(l => {
      const days = l.days_on_zillow;
      const badge = days === 0
        ? `<span class="badge badge-today">Today</span>`
        : `<span class="badge badge-yesterday">Yesterday</span>`;

      const beds = l.bedrooms != null ? `${l.bedrooms} bd` : '';
      const baths = l.bathrooms != null ? `${l.bathrooms} ba` : '';
      const sqft = l.living_area != null ? `${l.living_area.toLocaleString()} sqft` : '';
      const zip = l.zipcode ? `ZIP ${l.zipcode}` : '';

      const desc = (l.description || '').toLowerCase();
      let parkingHtml = '';
      if (desc.includes('parking') || desc.includes('garage') || desc.includes('carport')) {
        const parkMatch = (l.description || '').match(/[^.]*(?:parking|garage|carport)[^.]*/i);
        if (parkMatch) {
          parkingHtml = `<div class="parking-note">&#128663; ${parkMatch[0].trim()}</div>`;
        }
      }

      const amenityKeywords = ['laundry', 'dishwasher', 'pet', 'gym', 'pool', 'hardwood', 'a/c', 'air conditioning', 'balcony', 'deck', 'rooftop', 'in-unit'];
      const foundAmenities = amenityKeywords.filter(k => desc.includes(k)).map(k => {
        const labels = { 'a/c': 'A/C', 'air conditioning': 'A/C', 'in-unit': 'In-unit laundry', 'hardwood': 'Hardwood floors' };
        return `<span class="amenity-tag">${labels[k] || k.charAt(0).toUpperCase() + k.slice(1)}</span>`;
      });
      const amenitiesHtml = foundAmenities.length ? `<div class="amenities">${[...new Set(foundAmenities)].join('')}</div>` : '';

      const zillowUrl = l.detail_url || `https://www.zillow.com/homes/${l.zpid}_zpid/`;

      grid.innerHTML += `
        <div class="card">
          <div class="card-body">
            <div class="card-top">
              <div>
                <div class="address">${l.address || 'Address unavailable'}</div>
                ${zip ? `<div class="zipcode">${zip}</div>` : ''}
              </div>
              ${badge}
            </div>
            <div class="price">$${(l.price || 0).toLocaleString()}<span style="font-size:1rem;font-weight:500;color:#4a5568">/mo</span></div>
            <div class="meta">
              ${beds ? `<span class="meta-item">${beds}</span>` : ''}
              ${baths ? `<span class="meta-item">${baths}</span>` : ''}
              ${sqft ? `<span class="meta-item">${sqft}</span>` : ''}
            </div>
            ${parkingHtml}
            ${amenitiesHtml}
          </div>
          <div class="card-footer">
            <a class="btn-zillow" href="${zillowUrl}" target="_blank" rel="noopener">View on Zillow &rarr;</a>
          </div>
        </div>`;
    });

    app.appendChild(grid);
  }
</script>
</body>
</html>
