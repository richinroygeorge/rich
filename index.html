<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #222; }
  header { background: #1a1a2e; color: #fff; padding: 28px 24px 20px; }
  header h1 { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.5px; }
  .timestamp { font-size: 0.8rem; color: #aab; margin-top: 4px; }
  .filter-bar { background: #16213e; color: #ccd; font-size: 0.82rem; padding: 10px 24px; letter-spacing: 0.2px; }
  .container { max-width: 1200px; margin: 32px auto; padding: 0 16px; }
  .count { font-size: 0.9rem; color: #555; margin-bottom: 18px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .card-header { display: flex; flex-direction: column; gap: 4px; }
  .badge { display: inline-block; font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; width: fit-content; margin-bottom: 4px; }
  .badge.today { background: #d4edda; color: #155724; }
  .badge.yesterday { background: #fff3cd; color: #856404; }
  .address { font-weight: 700; font-size: 1rem; line-height: 1.3; }
  .zip { font-size: 0.82rem; color: #777; }
  .price { font-size: 1.55rem; font-weight: 800; color: #1a7a4a; }
  .details { display: flex; gap: 12px; font-size: 0.85rem; color: #444; flex-wrap: wrap; }
  .details span { background: #f4f5f7; padding: 3px 9px; border-radius: 5px; }
  .parking { font-size: 0.82rem; color: #555; }
  .amenities { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: 0.75rem; background: #e8f4fd; color: #1565c0; padding: 3px 9px; border-radius: 20px; }
  .btn { display: block; text-align: center; background: #1a1a2e; color: #fff; text-decoration: none; padding: 10px; border-radius: 7px; font-size: 0.88rem; font-weight: 600; margin-top: auto; transition: background 0.2s; }
  .btn:hover { background: #2d2d54; }
  .empty-state { text-align: center; padding: 60px 20px; color: #666; font-size: 1rem; line-height: 1.8; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
</style>
</head>
<body>
<header>
  <h1>SF Rentals - Fresh Listings</h1>
  <div class="timestamp">Updated: 2026-04-04T16:51:55.096119+00:00 UTC</div>
</header>
<div class="filter-bar">
  1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA
</div>
<div class="container">
  <div class="count">0 listings found</div>
  <div class="grid">
    <div class="empty-state"><p>No listings found matching your criteria at this time.</p><p>Check back soon — listings are refreshed every run.</p></div>
  </div>
</div>
</body>
</html>
