<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SF Rentals - Fresh Listings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 24px 32px;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header .timestamp {
      margin-top: 6px;
      font-size: 0.85rem;
      color: #a0aec0;
    }

    .filter-bar {
      background: #16213e;
      color: #cbd5e0;
      padding: 10px 32px;
      font-size: 0.82rem;
      letter-spacing: 0.3px;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 580px) {
      .grid { grid-template-columns: 1fr; }
      header { padding: 18px 16px; }
      .filter-bar { padding: 10px 16px; }
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.09);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.13);
    }

    .card-body {
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .card-address {
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.3;
      color: #1a1a2e;
    }

    .badge {
      flex-shrink: 0;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .badge-today {
      background: #c6f6d5;
      color: #22543d;
    }

    .badge-yesterday {
      background: #bee3f8;
      color: #2a4365;
    }

    .card-zip {
      font-size: 0.8rem;
      color: #718096;
    }

    .card-price {
      font-size: 1.6rem;
      font-weight: 800;
      color: #276749;
    }

    .card-details {
      font-size: 0.83rem;
      color: #4a5568;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .card-details span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-amenities {
      font-size: 0.78rem;
      color: #718096;
      line-height: 1.5;
    }

    .card-parking {
      font-size: 0.78rem;
      background: #ebf8ff;
      color: #2b6cb0;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 500;
    }

    .card-footer {
      padding: 0 20px 18px;
    }

    .btn-zillow {
      display: block;
      width: 100%;
      text-align: center;
      background: #1a1a2e;
      color: #fff;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 7px;
      font-size: 0.88rem;
      font-weight: 600;
      transition: background 0.15s ease;
    }

    .btn-zillow:hover {
      background: #2d2d5e;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #718096;
    }

    .empty-state h2 {
      font-size: 1.4rem;
      margin-bottom: 10px;
      color: #4a5568;
    }

    .empty-state p {
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

<header>
  <h1>SF Rentals - Fresh Listings</h1>
  <div class="timestamp">Last updated: 2026-04-04T19:24:45.278977+00:00 UTC</div>
</header>

<div class="filter-bar">
  1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA
</div>

<main>

  <div class="grid" id="listings-grid">

    <!-- Empty state: no listings fetched -->
    <div class="empty-state" style="grid-column: 1 / -1;">
      <h2>No listings available right now</h2>
      <p>The data fetch encountered network errors. Please try again later.</p>
    </div>

  </div>
</main>

</body>
</html>
