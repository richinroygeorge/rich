<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; }
  header { background: #1a1a2e; color: #fff; padding: 2rem 1.5rem 1.5rem; text-align: center; }
  header h1 { font-size: 1.9rem; font-weight: 700; letter-spacing: 0.02em; }
  header .ts { margin-top: 0.4rem; font-size: 0.85rem; opacity: 0.65; }
  .filter-bar { background: #16213e; color: #a8b8d0; text-align: center; padding: 0.65rem 1rem; font-size: 0.82rem; letter-spacing: 0.01em; }
  main { max-width: 1200px; margin: 2rem auto; padding: 0 1rem 3rem; }
  .count { margin-bottom: 1.2rem; font-size: 0.9rem; color: #555; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.4rem; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); padding: 1.3rem; display: flex; flex-direction: column; gap: 0.7rem; }
  .card-header { position: relative; }
  .badge { display: inline-block; font-size: 0.72rem; font-weight: 700; border-radius: 4px; padding: 2px 7px; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.04em; }
  .badge.today { background: #d4edda; color: #155724; }
  .badge.yesterday { background: #fff3cd; color: #856404; }
  .address { font-weight: 700; font-size: 1rem; line-height: 1.3; }
  .zip { font-size: 0.8rem; color: #777; margin-top: 2px; }
  .price { font-size: 1.6rem; font-weight: 800; color: #1a7f3c; }
  .specs { display: flex; gap: 0.9rem; font-size: 0.85rem; color: #444; flex-wrap: wrap; }
  .specs span { background: #f0f2f5; border-radius: 4px; padding: 2px 8px; }
  .parking { font-size: 0.82rem; color: #444; background: #f8f4e8; border-left: 3px solid #e0a800; padding: 0.4rem 0.6rem; border-radius: 0 4px 4px 0; }
  .amenities { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .amenity { background: #eef2ff; color: #3730a3; font-size: 0.75rem; border-radius: 4px; padding: 2px 7px; }
  .btn { display: block; text-align: center; background: #1a1a2e; color: #fff; text-decoration: none; padding: 0.6rem 1rem; border-radius: 6px; font-size: 0.88rem; font-weight: 600; margin-top: auto; transition: background 0.15s; }
  .btn:hover { background: #2a2a4e; }
  .empty { text-align: center; padding: 4rem 1rem; color: #666; font-size: 1.05rem; line-height: 1.7; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
</style>
</head>
<body>
<header>
  <h1>SF Rentals - Fresh Listings</h1>
  <div class="ts">Updated: 2026-04-13T19:11:01.623843+00:00 UTC</div>
</header>
<div class="filter-bar">1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA</div>
<main>
  <div class="count">0 listings found</div>
  <div class="empty"><p>No listings matched your criteria at this time.<br>Check back soon — this page refreshes automatically.</p></div>
</main>
</body>
</html>
