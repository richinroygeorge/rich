<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Rentals - Fresh Listings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; }
    header { background: #1a1a2e; color: #fff; padding: 2rem 1.5rem 1.5rem; }
    header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
    header .meta { margin-top: 0.5rem; font-size: 0.85rem; opacity: 0.75; }
    .filter-bar { background: #16213e; color: #a0c4ff; padding: 0.65rem 1.5rem; font-size: 0.82rem; letter-spacing: 0.02em; }
    main { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); overflow: hidden; display: flex; flex-direction: column; }
    .card-header { padding: 1rem 1rem 0.5rem; }
    .card-header h2 { font-size: 1rem; font-weight: 600; margin-top: 0.4rem; line-height: 1.3; }
    .zip { font-size: 0.8rem; color: #666; margin-top: 0.2rem; }
    .card-body { padding: 0.5rem 1rem; flex: 1; }
    .price { font-size: 1.5rem; font-weight: 700; color: #1a8a4a; margin: 0.4rem 0; }
    .specs { display: flex; gap: 0.75rem; font-size: 0.85rem; color: #444; margin-bottom: 0.5rem; }
    .specs span { background: #f0f2f5; padding: 0.2rem 0.5rem; border-radius: 4px; }
    .parking { font-size: 0.8rem; color: #555; margin: 0.4rem 0; }
    .amenities { list-style: none; display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.5rem; }
    .amenities li { background: #e8f4fd; color: #1565c0; font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 20px; }
    .card-footer { padding: 0.75rem 1rem 1rem; }
    .btn { display: block; text-align: center; background: #1a1a2e; color: #fff; text-decoration: none; padding: 0.6rem; border-radius: 8px; font-size: 0.9rem; font-weight: 500; transition: background 0.2s; }
    .btn:hover { background: #2d2d5e; }
    .badge { display: inline-block; font-size: 0.72rem; font-weight: 600; padding: 0.15rem 0.55rem; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge.today { background: #d4edda; color: #155724; }
    .badge.yesterday { background: #fff3cd; color: #856404; }
    .empty-state { text-align: center; padding: 4rem 2rem; color: #666; font-size: 1.05rem; grid-column: 1 / -1; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  </style>
</head>
<body>
  <header>
    <h1>SF Rentals &mdash; Fresh Listings</h1>
    <div class="meta">Updated: 2026-03-30T00:12:48.312504+00:00 UTC &nbsp;|&nbsp; 0 listing(s) found</div>
  </header>
  <div class="filter-bar">
    1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA
  </div>
  <main>
    <div class="grid">
      <div class="empty-state"><p>No listings found matching your criteria right now. Check back soon!</p></div>
    </div>
  </main>
</body>
</html>
