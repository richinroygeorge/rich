<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; }
  header { background: #1a1a2e; color: #fff; padding: 24px 32px; }
  header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
  header .ts { font-size: 0.82rem; color: #a0a8cc; margin-top: 4px; }
  .filter-bar { background: #16213e; color: #c8cfe8; font-size: 0.85rem; padding: 10px 32px; letter-spacing: 0.2px; }
  .container { max-width: 1200px; margin: 32px auto; padding: 0 20px; }
  .count { font-size: 0.95rem; color: #555; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .card-header { display: flex; flex-direction: column; gap: 4px; }
  .badge { display: inline-block; font-size: 0.72rem; font-weight: 700; border-radius: 4px; padding: 2px 8px; width: fit-content; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge.today { background: #d4f5e2; color: #1a6b3c; }
  .badge.yesterday { background: #fff3cd; color: #856404; }
  .address { font-size: 1rem; font-weight: 700; line-height: 1.3; }
  .zip { font-size: 0.8rem; color: #888; }
  .price { font-size: 1.7rem; font-weight: 800; color: #1e8a4a; line-height: 1; }
  .specs { display: flex; gap: 12px; font-size: 0.85rem; color: #555; flex-wrap: wrap; }
  .specs span { background: #f4f4f6; border-radius: 6px; padding: 3px 10px; }
  .parking { font-size: 0.82rem; color: #444; }
  .amenities { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
  .amenity { background: #eef2ff; color: #3a4db7; font-size: 0.75rem; border-radius: 5px; padding: 2px 8px; }
  .btn { display: block; margin-top: auto; background: #1a1a2e; color: #fff; text-align: center; padding: 10px; border-radius: 8px; text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: background 0.2s; }
  .btn:hover { background: #2d2d5e; }
  .empty { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); padding: 48px 32px; text-align: center; color: #777; font-size: 1.1rem; grid-column: 1/-1; }
</style>
</head>
<body>
<header>
  <h1>SF Rentals - Fresh Listings</h1>
  <div class="ts">Updated: 2026-04-14T20:05:31.787101+00:00 UTC</div>
</header>
<div class="filter-bar">
  1+ bed &nbsp;·&nbsp; $3,000&ndash;$4,000/mo &nbsp;·&nbsp; Listed in last 24hrs &nbsp;·&nbsp; Excl. Nob Hill, Tenderloin, Mission, SOMA
</div>
<div class="container">
  <div class="count">0 listings found</div>
  <div class="grid">
    <div class="empty">No listings matched your criteria right now. Check back soon!</div>
  </div>
</div>
</body>
</html>
