<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #222; }
  header { background: #1a1a2e; color: #fff; padding: 28px 24px 20px; }
  header h1 { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.5px; }
  header .meta { margin-top: 6px; font-size: 0.85rem; opacity: 0.7; }
  .filter-bar { background: #16213e; color: #a0aec0; font-size: 0.82rem; padding: 10px 24px; letter-spacing: 0.02em; }
  main { max-width: 1200px; margin: 32px auto; padding: 0 16px 48px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.09); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .card-top { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 6px; }
  .address { font-weight: 700; font-size: 1rem; flex: 1 1 auto; }
  .zip { font-size: 0.78rem; color: #666; align-self: center; }
  .badge { font-size: 0.72rem; font-weight: 700; border-radius: 20px; padding: 3px 9px; align-self: center; }
  .badge.today { background: #d1fae5; color: #065f46; }
  .badge.yesterday { background: #fef3c7; color: #92400e; }
  .price { font-size: 1.6rem; font-weight: 800; color: #16a34a; }
  .details { display: flex; gap: 14px; font-size: 0.88rem; color: #555; }
  .parking { font-size: 0.8rem; color: #555; background: #f8f8f8; border-radius: 6px; padding: 6px 10px; }
  .amenities { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { background: #ede9fe; color: #5b21b6; font-size: 0.75rem; border-radius: 20px; padding: 3px 10px; }
  .btn { display: inline-block; margin-top: auto; background: #1a1a2e; color: #fff; text-decoration: none; text-align: center; border-radius: 8px; padding: 10px 0; font-size: 0.9rem; font-weight: 600; transition: background .15s; }
  .btn:hover { background: #2d2d5e; }
  .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #666; font-size: 1.1rem; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
</style>
</head>
<body>
<header>
  <h1>SF Rentals &mdash; Fresh Listings</h1>
  <div class="meta">Updated: 2026-03-30T08:20:56.976901+00:00 UTC &nbsp;|&nbsp; 0 listings found</div>
</header>
<div class="filter-bar">
  1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA
</div>
<main>
  <div class="grid">
    <div class="empty-state"><p>No listings matched the criteria right now. Check back soon!</p></div>
  </div>
</main>
</body>
</html>
