<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    color: #222;
    min-height: 100vh;
  }

  header {
    background: #1a1a2e;
    color: #fff;
    padding: 24px 32px;
  }

  header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .timestamp {
    font-size: 0.8rem;
    color: #a0a8c0;
    margin-top: 4px;
  }

  .filter-bar {
    background: #16213e;
    color: #c8d0e8;
    padding: 10px 32px;
    font-size: 0.85rem;
    border-top: 1px solid #0f3460;
  }

  .filter-bar span {
    background: #0f3460;
    border-radius: 20px;
    padding: 3px 10px;
    margin-right: 6px;
    display: inline-block;
  }

  main {
    max-width: 1200px;
    margin: 32px auto;
    padding: 0 16px;
  }

  .results-count {
    font-size: 0.9rem;
    color: #555;
    margin-bottom: 20px;
    font-weight: 500;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  @media (max-width: 900px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 560px) {
    .grid { grid-template-columns: 1fr; }
    header { padding: 18px 16px; }
    .filter-bar { padding: 10px 16px; }
  }

  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.09);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.13);
  }

  .card-body {
    padding: 18px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }

  .address {
    font-weight: 700;
    font-size: 1rem;
    line-height: 1.35;
    color: #1a1a2e;
  }

  .badge {
    flex-shrink: 0;
    font-size: 0.7rem;
    font-weight: 600;
    border-radius: 20px;
    padding: 3px 9px;
    white-space: nowrap;
  }

  .badge-today { background: #d4edda; color: #155724; }
  .badge-yesterday { background: #fff3cd; color: #856404; }

  .zip {
    font-size: 0.8rem;
    color: #777;
  }

  .price {
    font-size: 1.55rem;
    font-weight: 800;
    color: #1a9e4a;
    letter-spacing: -0.5px;
  }

  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 0.82rem;
    color: #555;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .meta-item::before {
    content: attr(data-icon);
    font-size: 0.9em;
  }

  .section-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  .amenities {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 2px;
  }

  .tag {
    background: #f0f2f5;
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 0.75rem;
    color: #444;
  }

  .parking-info {
    font-size: 0.82rem;
    color: #555;
    background: #f7f9fc;
    border-left: 3px solid #1a9e4a;
    padding: 5px 10px;
    border-radius: 0 6px 6px 0;
    margin-top: 2px;
  }

  .card-footer {
    padding: 12px 20px;
    border-top: 1px solid #f0f0f0;
  }

  .btn-zillow {
    display: block;
    width: 100%;
    background: #1a1a2e;
    color: #fff;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.2px;
    transition: background 0.15s;
  }

  .btn-zillow:hover { background: #0f3460; }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: #777;
  }

  .empty-state .icon {
    font-size: 3rem;
    margin-bottom: 16px;
  }

  .empty-state h2 {
    font-size: 1.3rem;
    color: #444;
    margin-bottom: 8px;
  }

  .empty-state p {
    font-size: 0.9rem;
    max-width: 400px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .error-note {
    background: #fff3cd;
    border: 1px solid #ffc107;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.85rem;
    color: #856404;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<header>
  <h1>SF Rentals &mdash; Fresh Listings</h1>
  <div class="timestamp" id="ts">Loading timestamp...</div>
</header>

<div class="filter-bar">
  <span>1+ bed</span>
  <span>$3,000&ndash;$4,000/mo</span>
  <span>Listed in last 24hrs</span>
  <span>Excl. Nob Hill, Tenderloin, Mission, SOMA</span>
</div>

<main id="main">
  <div class="results-count" id="count"></div>
  <div id="content"></div>
</main>

<script>
const DATA = {"listings": [], "timestamp": "2026-03-28T00:00:00+00:00", "fetch_error": "ProxyError: outbound HTTPS blocked in this environment"};

document.getElementById('ts').textContent = 'Last updated: ' + (DATA.timestamp ? new Date(DATA.timestamp).toUTCString() : 'Unknown');

const listings = DATA.listings || [];
const countEl = document.getElementById('count');
const contentEl = document.getElementById('content');

if (DATA.fetch_error) {
  contentEl.innerHTML = `<div class="error-note">
    <strong>Data fetch error:</strong> ${DATA.fetch_error}. The listing data could not be retrieved in this environment due to network restrictions. Deploy this page in a network-enabled environment to see live results.
  </div>`;
}

countEl.textContent = listings.length + ' listing' + (listings.length !== 1 ? 's' : '') + ' found';

if (listings.length === 0) {
  contentEl.innerHTML += `
    <div class="empty-state">
      <div class="icon">&#127968;</div>
      <h2>No listings found</h2>
      <p>No SF rentals matched your filters (1+ bed, $3,000&ndash;$4,000/mo, listed within 24 hours, excluding Nob Hill / Tenderloin / Mission / SOMA) at this time. Check back soon!</p>
    </div>`;
} else {
  const grid = document.createElement('div');
  grid.className = 'grid';

  listings.forEach(l => {
    const days = l.days_on_zillow;
    const badgeClass = days === 0 ? 'badge-today' : 'badge-yesterday';
    const badgeText = days === 0 ? 'Today' : 'Yesterday';
    const details = l.details || {};
    const desc = (details.description || '').toLowerCase();

    // Parse parking from description
    let parkingText = '';
    if (/parking included|parking available|1 garage|2 garage|covered parking|carport|garage parking/.test(desc)) {
      const m = desc.match(/([\w\s]*parking[\w\s]*(?:included|available|space|spot|garage|carport)[^.]*)/i);
      if (m) parkingText = m[1].trim().replace(/^\w/, c => c.toUpperCase());
      else parkingText = 'Parking available';
    } else if (/no parking|street parking only/.test(desc)) {
      parkingText = 'Street parking only';
    }

    // Amenities
    const amenityMap = {
      'In-unit laundry': /in.unit laundry|washer.dryer in unit/,
      'Dishwasher': /dishwasher/,
      'Hardwood floors': /hardwood/,
      'Pets OK': /pets? (allowed|ok|welcome)/,
      'Gym': /\bgym\b|fitness center/,
      'Rooftop': /rooftop/,
      'A/C': /air conditioning|\bac\b|central air/,
      'Balcony': /balcon/,
    };
    const amenities = Object.entries(amenityMap)
      .filter(([, re]) => re.test(desc))
      .map(([name]) => name);

    const sqft = l.living_area || details.living_area || '';
    const baths = l.bathrooms || details.bathrooms || '';
    const beds = l.bedrooms || details.bedrooms || '';
    const zip = l.zipcode || '';
    const price = l.price;
    const address = l.address || 'Address not available';
    const url = l.detail_url || l.url || '#';

    grid.innerHTML += `
      <div class="card">
        <div class="card-body">
          <div class="card-header">
            <div class="address">${address}</div>
            <span class="badge ${badgeClass}">${badgeText}</span>
          </div>
          ${zip ? `<div class="zip">ZIP: ${zip}</div>` : ''}
          <div class="price">$${price ? price.toLocaleString() : 'N/A'}/mo</div>
          <div class="meta">
            ${beds ? `<span class="meta-item" data-icon="&#128716;">  ${beds} bed${beds !== 1 ? 's' : ''}</span>` : ''}
            ${baths ? `<span class="meta-item" data-icon="&#128704;">  ${baths} bath${baths !== 1 ? 's' : ''}</span>` : ''}
            ${sqft ? `<span class="meta-item" data-icon="&#128207;">  ${sqft} sqft</span>` : ''}
          </div>
          ${parkingText ? `<div class="section-label">Parking</div><div class="parking-info">${parkingText}</div>` : ''}
          ${amenities.length ? `
            <div class="section-label">Amenities</div>
            <div class="amenities">${amenities.map(a => `<span class="tag">${a}</span>`).join('')}</div>` : ''}
        </div>
        <div class="card-footer">
          <a class="btn-zillow" href="${url}" target="_blank" rel="noopener">View on Zillow &rarr;</a>
        </div>
      </div>`;
  });

  contentEl.appendChild(grid);
}
</script>
</body>
</html>
