<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; }
  header { background: #1a1a2e; color: #fff; padding: 1.5rem 2rem; }
  header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: .5px; }
  header .ts { font-size: .8rem; color: #aab; margin-top: .3rem; }
  .filter-bar { background: #16213e; color: #ccd; font-size: .85rem; padding: .6rem 2rem; }
  .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.4rem; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.1); padding: 1.3rem 1.2rem 1rem; position: relative; display: flex; flex-direction: column; gap: .45rem; }
  .badge { position: absolute; top: 1rem; right: 1rem; color: #fff; font-size: .72rem; font-weight: 700; padding: .2rem .6rem; border-radius: 20px; text-transform: uppercase; letter-spacing: .5px; }
  .card h2 { font-size: 1rem; font-weight: 700; padding-right: 4.5rem; line-height: 1.35; }
  .zip { font-size: .8rem; color: #888; }
  .price { font-size: 1.5rem; font-weight: 800; color: #27ae60; }
  .meta { font-size: .85rem; color: #555; }
  .parking, .amenities { font-size: .78rem; color: #666; }
  .btn { display: inline-block; margin-top: .6rem; background: #1a1a2e; color: #fff; text-decoration: none; padding: .5rem 1rem; border-radius: 6px; font-size: .85rem; font-weight: 600; text-align: center; transition: background .2s; }
  .btn:hover { background: #16213e; }
  .empty { grid-column: 1/-1; text-align: center; padding: 3rem 1rem; color: #888; font-size: 1.1rem; }
  footer { text-align: center; padding: 2rem; color: #aaa; font-size: .8rem; }
</style>
</head>
<body>
<header>
  <h1>SF Rentals - Fresh Listings</h1>
  <div class="ts">Updated: 2026-03-27T00:08:45.337236+00:00 UTC</div>
</header>
<div class="filter-bar">1+ bed &middot; $3,000-$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA</div>
<div class="container">
  <div class="grid">
    <div class="empty">No listings found matching the current criteria. Check back soon!</div>
  </div>
</div>
<footer>Data sourced via Zillow API &middot; Auto-updated by SF Rentals Bot</footer>
</body>
</html>
