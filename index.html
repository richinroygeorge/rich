<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Rentals - Fresh Listings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 28px 24px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    header .timestamp {
      font-size: 0.85rem;
      color: #a0a8c0;
    }

    .filter-bar {
      background: #16213e;
      color: #c8d0e8;
      text-align: center;
      padding: 10px 16px;
      font-size: 0.82rem;
      letter-spacing: 0.3px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    .results-count {
      color: #555;
      font-size: 0.9rem;
      margin-bottom: 20px;
      font-weight: 500;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 580px) {
      .grid { grid-template-columns: 1fr; }
      header h1 { font-size: 1.4rem; }
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.13);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 0.72rem;
      font-weight: 700;
      border-radius: 4px;
      padding: 2px 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge.today {
      background: #d4edda;
      color: #1a6830;
    }

    .badge.yesterday {
      background: #fff3cd;
      color: #856404;
    }

    .zip {
      font-size: 0.75rem;
      color: #888;
      margin-left: auto;
    }

    .address {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.3;
    }

    .price {
      font-size: 1.6rem;
      font-weight: 800;
      color: #27ae60;
    }

    .details-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 0.85rem;
      color: #555;
    }

    .details-row span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .parking {
      font-size: 0.8rem;
      color: #666;
      background: #f8f9fa;
      border-radius: 6px;
      padding: 6px 10px;
      line-height: 1.4;
    }

    .amenities {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .amenity {
      font-size: 0.72rem;
      background: #eef2ff;
      color: #4050b5;
      border-radius: 20px;
      padding: 3px 10px;
      font-weight: 500;
    }

    .card-footer {
      margin-top: auto;
      padding-top: 6px;
    }

    .btn {
      display: inline-block;
      background: #1a1a2e;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.15s ease;
    }

    .btn:hover {
      background: #2d2d54;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #888;
    }

    .empty-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
    }

    .empty-state h2 {
      font-size: 1.4rem;
      color: #444;
      margin-bottom: 10px;
    }

    .empty-state p {
      font-size: 0.95rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <header>
    <h1>SF Rentals &mdash; Fresh Listings</h1>
    <div class="timestamp">Updated: 2026-04-14 22:15 UTC</div>
  </header>
  <div class="filter-bar">
    1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA
  </div>
  <div class="container">
    <div class="results-count">0 listings found</div>
    
    <div class="empty-state">
      <div class="empty-icon">&#128269;</div>
      <h2>No listings found</h2>
      <p>No SF rentals matched the criteria at this time.<br>
      Check back soon — listings refresh frequently.</p>
    </div>
  </div>
</body>
</html>
