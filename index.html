<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Rentals - Fresh Listings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #222; }
    header { background: #1a1a2e; color: #fff; padding: 2rem 1.5rem 1.5rem; }
    header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
    header .ts { font-size: 0.8rem; color: #aab4d4; margin-top: 0.3rem; }
    .filter-bar { background: #16213e; color: #a0b0d8; font-size: 0.82rem; padding: 0.6rem 1.5rem; border-top: 1px solid #2a2a4e; }
    main { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
    .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); padding: 1.25rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .card-header { display: flex; flex-direction: column; gap: 0.25rem; }
    .badge { display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.05em; width: fit-content; }
    .badge.today { background: #d4edda; color: #155724; }
    .badge.yesterday { background: #fff3cd; color: #856404; }
    .address { font-size: 1rem; font-weight: 700; margin-top: 0.4rem; line-height: 1.3; }
    .zip { font-size: 0.8rem; color: #666; }
    .price { font-size: 1.6rem; font-weight: 800; color: #1a7f45; }
    .meta { display: flex; gap: 0.75rem; font-size: 0.83rem; color: #444; flex-wrap: wrap; }
    .parking { font-size: 0.82rem; color: #555; }
    .amenities { display: flex; flex-wrap: wrap; gap: 0.4rem; min-height: 1rem; }
    .tag { background: #eef2ff; color: #3730a3; font-size: 0.72rem; font-weight: 600; padding: 0.15rem 0.5rem; border-radius: 999px; }
    .btn { display: block; margin-top: auto; padding: 0.6rem 1rem; background: #1a1a2e; color: #fff; text-align: center; border-radius: 6px; text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: background 0.2s; }
    .btn:hover { background: #2d2d5e; }
    .empty { text-align: center; padding: 4rem 2rem; color: #666; font-size: 1.1rem; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    footer { text-align: center; font-size: 0.75rem; color: #999; padding: 2rem; }
  </style>
</head>
<body>
  <header>
    <h1>SF Rentals - Fresh Listings</h1>
    <div class="ts">Updated: 2026-04-09T04:32:34.424319+00:00 UTC</div>
  </header>
  <div class="filter-bar">
    1+ bed &nbsp;&middot;&nbsp; $3,000&ndash;$4,000/mo &nbsp;&middot;&nbsp; Listed in last 24hrs &nbsp;&middot;&nbsp; Excl. Nob Hill, Tenderloin, Mission, SOMA
  </div>
  <main>
    <div class="empty"><p>No listings found matching your criteria right now. Check back soon.</p></div>
  </main>
  <footer>Data sourced via Zillow. Refreshed automatically.</footer>
</body>
</html>
