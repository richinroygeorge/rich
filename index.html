<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Rentals - Fresh Listings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; }
    header { background: #1a1a2e; color: #fff; padding: 28px 24px 20px; text-align: center; }
    header h1 { font-size: 1.9rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
    header .ts { font-size: 0.82rem; color: #a0aec0; margin-bottom: 10px; }
    .filter-bar { display: inline-block; background: rgba(255,255,255,0.08); border-radius: 20px; padding: 6px 18px; font-size: 0.82rem; color: #cbd5e0; }
    main { max-width: 1200px; margin: 0 auto; padding: 32px 16px 48px; }
    .count { font-size: 0.9rem; color: #555; margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    .card-header { position: relative; }
    .badge { display: inline-block; border-radius: 6px; font-size: 0.72rem; font-weight: 700; padding: 2px 8px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .badge.today { background: #d1fae5; color: #065f46; }
    .badge.yesterday { background: #fef3c7; color: #92400e; }
    .address { font-size: 1rem; font-weight: 700; line-height: 1.35; }
    .zipcode { font-size: 0.8rem; color: #777; margin-top: 2px; }
    .price { font-size: 1.55rem; font-weight: 800; color: #16a34a; }
    .specs { font-size: 0.85rem; color: #555; }
    .parking { font-size: 0.82rem; color: #444; }
    .amenities { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag { background: #eef2ff; color: #3730a3; font-size: 0.74rem; border-radius: 4px; padding: 2px 7px; }
    .btn { display: block; margin-top: auto; padding: 10px 0; background: #1a1a2e; color: #fff; text-align: center; border-radius: 8px; text-decoration: none; font-size: 0.87rem; font-weight: 600; transition: background 0.15s; }
    .btn:hover { background: #2d2d5e; }
    .empty { text-align: center; padding: 80px 20px; }
    .empty-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .empty-title { font-size: 1.4rem; font-weight: 700; color: #333; margin-bottom: 8px; }
    .empty-sub { font-size: 0.95rem; color: #666; max-width: 380px; margin: 0 auto; }
  </style>
</head>
<body>
  <header>
    <h1>SF Rentals - Fresh Listings</h1>
    <div class="ts">Updated: 2026-03-27 19:07 UTC</div>
    <div class="filter-bar">1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA</div>
  </header>
  <main>
    <div class="count">0 listings found</div>
    
    <div class="empty">
      <div class="empty-icon">&#127968;</div>
      <div class="empty-title">No listings found</div>
      <div class="empty-sub">No SF rentals matched the criteria at this time. Check back soon.</div>
    </div>
  </main>
</body>
</html>
