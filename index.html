<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Rentals - Fresh Listings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f4f6f9; color: #222; }
    header { background: #1a1a2e; color: #fff; padding: 24px 32px; }
    header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
    header .timestamp { font-size: 0.85rem; color: #a0a8c0; margin-top: 4px; }
    .filter-bar { background: #16213e; color: #c8d0e8; font-size: 0.85rem; padding: 10px 32px; letter-spacing: 0.2px; }
    .container { max-width: 1200px; margin: 32px auto; padding: 0 16px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
    .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); padding: 20px; position: relative; display: flex; flex-direction: column; gap: 8px; }
    .badge { position: absolute; top: 14px; right: 14px; background: #27ae60; color: #fff; font-size: 0.72rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
    .address { font-size: 1rem; font-weight: 700; color: #1a1a2e; line-height: 1.3; padding-right: 60px; }
    .zip { font-size: 0.8rem; color: #888; }
    .price { font-size: 1.5rem; font-weight: 800; color: #27ae60; margin: 4px 0; }
    .details { font-size: 0.85rem; color: #555; }
    .parking { font-size: 0.8rem; color: #666; font-style: italic; }
    .amenities { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
    .tag { background: #eef2ff; color: #3a5bd9; font-size: 0.73rem; padding: 2px 8px; border-radius: 12px; }
    .btn { display: inline-block; margin-top: auto; padding-top: 12px; background: #1a1a2e; color: #fff; text-align: center; text-decoration: none; border-radius: 6px; padding: 10px 16px; font-size: 0.88rem; font-weight: 600; transition: background 0.2s; }
    .btn:hover { background: #2d2d5e; }
    .empty { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #888; font-size: 1rem; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  </style>
</head>
<body>
  <header>
    <h1>SF Rentals - Fresh Listings</h1>
    <div class="timestamp">Updated: 2026-03-31T09:02:38.929823+00:00 UTC</div>
  </header>
  <div class="filter-bar">
    1+ bed &middot; $3,000-$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA
  </div>
  <div class="container">
    <div class="grid">
      <div class="empty">No listings found matching your criteria at this time. Check back soon.</div>
    </div>
  </div>
</body>
</html>
