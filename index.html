<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #222; }
  header { background: #1a1a2e; color: #fff; padding: 2rem 1.5rem 1.5rem; }
  header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.4rem; }
  header .timestamp { font-size: 0.85rem; color: #aaa; margin-bottom: 0.8rem; }
  header .filters { font-size: 0.9rem; color: #c8d6ff; background: rgba(255,255,255,0.08);
    display: inline-block; padding: 0.4rem 0.9rem; border-radius: 20px; }
  main { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 12px; padding: 1.4rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.09); display: flex; flex-direction: column; gap: 0.7rem; }
  .card-header { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 0.4rem; }
  .address { font-weight: 700; font-size: 1rem; flex: 1; min-width: 0; }
  .zip { font-size: 0.8rem; color: #666; align-self: center; }
  .badge { font-size: 0.75rem; font-weight: 600; color: #fff; padding: 0.2rem 0.6rem;
    border-radius: 12px; white-space: nowrap; }
  .price { font-size: 1.6rem; font-weight: 800; color: #1e8c3a; }
  .details { display: flex; gap: 1rem; font-size: 0.88rem; color: #555; flex-wrap: wrap; }
  .parking { font-size: 0.82rem; color: #444; border-left: 3px solid #1a1a2e; padding-left: 0.5rem; }
  .amenities { font-size: 0.8rem; color: #666; }
  .btn { display: block; text-align: center; margin-top: auto; padding: 0.6rem 1rem;
    background: #1a1a2e; color: #fff; border-radius: 8px; text-decoration: none;
    font-size: 0.9rem; font-weight: 600; transition: background 0.2s; }
  .btn:hover { background: #2e2e5e; }
  .empty { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; font-size: 1.1rem; color: #666;
    background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
</style>
</head>
<body>
<header>
  <h1>SF Rentals - Fresh Listings</h1>
  <div class="timestamp">Updated: 2026-04-04T21:21:41.166676+00:00</div>
  <div class="filters">1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA</div>
</header>
<main>
  <div class="grid">
    <div class="empty">No listings matched your criteria right now. Check back soon.</div>
  </div>
</main>
</body>
</html>
