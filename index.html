<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; }
  header { background: #1a1a2e; color: #fff; padding: 28px 24px 22px; }
  header h1 { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.5px; }
  .timestamp { font-size: 0.8rem; color: #aab; margin-top: 4px; }
  .filter-bar { background: #16213e; color: #c8d0e7; font-size: 0.82rem; padding: 10px 24px; border-top: 1px solid #2a2a4a; }
  .count-bar { max-width: 1200px; margin: 20px auto 0; padding: 0 16px; font-size: 0.9rem; color: #555; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1200px; margin: 16px auto 40px; padding: 0 16px; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); overflow: hidden; display: flex; flex-direction: column; }
  .card-header { padding: 16px 16px 8px; border-bottom: 1px solid #f0f0f0; }
  .badge { display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .badge.today { background: #d4edda; color: #155724; }
  .badge.yesterday { background: #fff3cd; color: #856404; }
  .address { font-weight: 700; font-size: 1rem; line-height: 1.3; }
  .zip { font-size: 0.8rem; color: #888; margin-top: 2px; }
  .price { font-size: 1.8rem; font-weight: 800; color: #1a7f3c; padding: 12px 16px 4px; }
  .per-mo { font-size: 0.9rem; font-weight: 400; color: #555; }
  .stats { display: flex; gap: 12px; padding: 0 16px 10px; font-size: 0.83rem; color: #555; flex-wrap: wrap; }
  .parking { padding: 0 16px 8px; font-size: 0.8rem; color: #444; }
  .amenities { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px 12px; }
  .amenity { background: #eef2ff; color: #3730a3; font-size: 0.72rem; padding: 2px 8px; border-radius: 99px; }
  .zillow-btn { display: block; margin: auto 16px 16px; padding: 10px; background: #006aff; color: #fff; text-align: center; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 0.9rem; transition: background 0.15s; }
  .zillow-btn:hover { background: #0050cc; }
  .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #888; }
  .empty-icon { font-size: 3rem; display: block; margin-bottom: 16px; }
  .empty-state p { font-size: 1.1rem; margin-bottom: 8px; }
  .empty-sub { font-size: 0.85rem; color: #aaa; }
</style>
</head>
<body>
<header>
  <h1>SF Rentals - Fresh Listings</h1>
  <div class="timestamp">Updated: 2026-03-31T10:23:48.234085+00:00 UTC</div>
</header>
<div class="filter-bar">
  1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA
</div>
<div class="count-bar">0 listings found</div>
<div class="grid">
<div class="empty-state"><span class="empty-icon">&#128269;</span><p>No qualifying listings found at this time.</p><p class="empty-sub">Check back soon — new listings are fetched every run.</p></div>
</div>
</body>
</html>
