<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #222; }
  header { background: #1a1a2e; color: #fff; padding: 2rem 1.5rem 1.5rem; }
  header h1 { font-size: 1.7rem; font-weight: 700; letter-spacing: -.5px; }
  header .ts { font-size: .8rem; color: #a0a8c0; margin-top: .3rem; }
  .filter-bar { background: #16213e; color: #7eb8f7; font-size: .82rem; padding: .6rem 1.5rem; letter-spacing: .02em; }
  main { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.09); padding: 1.2rem 1.1rem 1rem; display: flex; flex-direction: column; gap: .55rem; }
  .card-top { display: flex; flex-direction: column; gap: .2rem; }
  .badge { display: inline-block; font-size: .7rem; font-weight: 700; border-radius: 4px; padding: .15rem .45rem; width: fit-content; }
  .badge.today { background: #d4edda; color: #155724; }
  .badge.yesterday { background: #fff3cd; color: #856404; }
  .address { font-weight: 700; font-size: 1rem; line-height: 1.3; }
  .zip { font-size: .78rem; color: #888; }
  .price { font-size: 1.45rem; font-weight: 800; color: #1a7a3a; }
  .meta { font-size: .85rem; color: #555; }
  .parking { font-size: .8rem; color: #444; }
  .amenities { display: flex; flex-wrap: wrap; gap: .3rem; }
  .amenity { font-size: .72rem; background: #eef2ff; color: #3730a3; border-radius: 4px; padding: .15rem .4rem; }
  .btn { display: block; text-align: center; background: #1a1a2e; color: #fff; text-decoration: none; border-radius: 6px; padding: .55rem; font-size: .88rem; font-weight: 600; margin-top: auto; transition: background .15s; }
  .btn:hover { background: #2d2d5e; }
  .empty { grid-column: 1/-1; text-align: center; padding: 3rem 1rem; color: #888; font-size: 1.1rem; }
  .count { margin-bottom: 1rem; font-size: .9rem; color: #555; }
</style>
</head>
<body>
<header>
  <h1>SF Rentals &mdash; Fresh Listings</h1>
  <div class="ts">Updated: 2026-03-28T01:11:56.634652+00:00 UTC</div>
</header>
<div class="filter-bar">1+ bed &middot; $3,000&ndash;$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA</div>
<main>
  <div class="count">0 listing(s) found</div>
  <div class="grid">
    <div class="empty">No listings matched the criteria at this time. Check back soon.</div>
  </div>
</main>
</body>
</html>
