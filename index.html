<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; }

  header { background: #1a1a2e; color: #fff; padding: 28px 24px 20px; }
  header h1 { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.3px; }
  header .ts { font-size: 0.78rem; color: #a0a8c0; margin-top: 4px; }
  .filter-bar { background: #16213e; color: #c8d0e8; font-size: 0.82rem; padding: 10px 24px; border-top: 1px solid #252550; }
  .filter-bar span { margin-right: 8px; }
  .filter-bar strong { color: #7eb8f7; }

  .container { max-width: 1200px; margin: 0 auto; padding: 28px 16px 48px; }
  .count-bar { font-size: 0.88rem; color: #555; margin-bottom: 18px; }
  .count-bar strong { color: #1a1a2e; }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }

  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); padding: 20px; display: flex; flex-direction: column; gap: 10px; transition: box-shadow 0.2s; }
  .card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.14); }

  .card-header { position: relative; }
  .address { font-weight: 700; font-size: 1rem; margin-top: 4px; line-height: 1.3; }
  .zip { font-size: 0.8rem; color: #777; margin-top: 2px; }

  .badge { display: inline-block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 20px; }
  .badge.today { background: #dcfce7; color: #15803d; }
  .badge.yesterday { background: #fef9c3; color: #854d0e; }

  .price { font-size: 1.7rem; font-weight: 800; color: #16a34a; line-height: 1; }
  .per-mo { font-size: 0.9rem; font-weight: 500; color: #555; }

  .meta { display: flex; flex-wrap: wrap; gap: 10px; font-size: 0.85rem; color: #444; }
  .meta-item { display: flex; align-items: center; gap: 4px; }

  .parking { font-size: 0.8rem; color: #555; background: #f8f8f8; border-radius: 6px; padding: 6px 10px; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
  .tag { background: #eff6ff; color: #1d4ed8; font-size: 0.72rem; padding: 3px 8px; border-radius: 20px; font-weight: 500; }

  .btn { display: block; text-align: center; background: #1a1a2e; color: #fff; text-decoration: none; padding: 10px 16px; border-radius: 8px; font-size: 0.88rem; font-weight: 600; margin-top: auto; transition: background 0.15s; }
  .btn:hover { background: #2d2d5e; }

  .empty-state { text-align: center; padding: 80px 24px; color: #555; }
  .empty-icon { font-size: 3.5rem; margin-bottom: 16px; }
  .empty-state p { font-size: 1.05rem; margin-bottom: 8px; }
  .empty-state .sub { font-size: 0.88rem; color: #888; }
</style>
</head>
<body>
<header>
  <h1>SF Rentals - Fresh Listings</h1>
  <div class="ts">Updated: 2026-03-27T15:05:52.152029+00:00 UTC</div>
</header>
<div class="filter-bar">
  <strong>Filters:</strong>
  <span>1+ bed</span>&middot;
  <span>$3,000&ndash;$4,000/mo</span>&middot;
  <span>Listed in last 24hrs</span>&middot;
  <span>Excl. Nob Hill, Tenderloin, Mission, SOMA</span>
</div>
<div class="container">
  <div class="count-bar"><strong>0</strong> listings found</div>
  <div class="grid">
    <div class="empty-state"><div class="empty-icon">&#x1F3E0;</div><p>No listings matched your criteria right now.</p><p class="sub">Check back soon — fresh listings are fetched every run.</p></div>
  </div>
</div>
</body>
</html>
