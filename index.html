<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Rentals - Fresh Listings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 28px 24px 22px;
      text-align: center;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    header .timestamp {
      font-size: 0.82rem;
      color: #a0a8cc;
      margin-bottom: 10px;
    }
    header .filter-summary {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 5px 16px;
      font-size: 0.8rem;
      color: #c8d0f0;
      margin-top: 4px;
    }

    .count-bar {
      max-width: 1200px;
      margin: 24px auto 0;
      padding: 0 20px;
      font-size: 0.9rem;
      color: #555;
      font-weight: 500;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
      max-width: 1200px;
      margin: 16px auto 48px;
      padding: 0 20px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 580px) {
      .grid { grid-template-columns: 1fr; }
      header h1 { font-size: 1.5rem; }
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.09);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 22px rgba(0,0,0,0.13);
    }

    .card-header { display: flex; flex-direction: column; gap: 6px; }

    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 9px;
      border-radius: 12px;
      width: fit-content;
    }
    .badge.today { background: #d1fae5; color: #065f46; }
    .badge.yesterday { background: #fef3c7; color: #92400e; }

    .address {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.3;
    }
    .zip {
      font-size: 0.78rem;
      color: #888;
    }

    .price {
      font-size: 1.6rem;
      font-weight: 800;
      color: #16a34a;
      line-height: 1;
    }

    .specs {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.88rem;
      color: #444;
    }
    .spec-sep { color: #bbb; }

    .parking {
      font-size: 0.82rem;
      color: #555;
      line-height: 1.4;
    }

    .amenities {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .amenity-tag {
      background: #eef2ff;
      color: #3730a3;
      font-size: 0.74rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 10px;
    }

    .view-btn {
      display: block;
      margin-top: auto;
      background: #1a1a2e;
      color: #fff;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      transition: background 0.15s ease;
    }
    .view-btn:hover { background: #2d2d5e; }

    .empty-state {
      text-align: center;
      padding: 80px 24px;
      max-width: 480px;
      margin: 40px auto;
    }
    .empty-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .empty-state h2 { font-size: 1.4rem; color: #333; margin-bottom: 10px; }
    .empty-state p { color: #666; line-height: 1.7; font-size: 0.95rem; }
  </style>
</head>
<body>
  <header>
    <h1>SF Rentals - Fresh Listings</h1>
    <p class="timestamp">Updated: 2026-04-09 19:19 UTC</p>
    <span class="filter-summary">1+ bed &nbsp;&middot;&nbsp; $3,000&ndash;$4,000/mo &nbsp;&middot;&nbsp; Listed in last 24hrs &nbsp;&middot;&nbsp; Excl. Nob Hill, Tenderloin, Mission, SOMA</span>
  </header>

  <div class="count-bar">0 listings found</div>

  
    <div class="empty-state">
      <div class="empty-icon">&#x1F3E0;</div>
      <h2>No listings found</h2>
      <p>No SF rentals matched your criteria right now.<br>Check back soon &mdash; listings update frequently.</p>
    </div>
</body>
</html>
