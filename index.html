<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Rentals - Fresh Listings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; }
  header { background: #1a1a2e; color: #fff; padding: 2rem 1.5rem 1.5rem; }
  header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.5px; }
  header .meta { margin-top: 0.4rem; font-size: 0.85rem; opacity: 0.7; }
  .filter-bar { background: #16213e; color: #a8b5d8; font-size: 0.8rem; padding: 0.6rem 1.5rem; letter-spacing: 0.3px; }
  main { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); padding: 1.25rem; display: flex; flex-direction: column; gap: 0.65rem; }
  .card-header { position: relative; }
  .card h2 { font-size: 0.95rem; font-weight: 600; margin-top: 0.3rem; line-height: 1.35; }
  .zip { font-size: 0.78rem; color: #888; margin-top: 0.15rem; }
  .price { font-size: 1.6rem; font-weight: 700; color: #1a8a4a; }
  .details { display: flex; gap: 0.75rem; font-size: 0.82rem; color: #555; flex-wrap: wrap; }
  .details span { background: #f4f6f8; border-radius: 4px; padding: 0.2rem 0.5rem; }
  .parking { font-size: 0.78rem; color: #666; border-left: 3px solid #e0e0e0; padding-left: 0.5rem; }
  .amenities { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .tag { font-size: 0.72rem; background: #eef2ff; color: #4455bb; border-radius: 3px; padding: 0.15rem 0.45rem; }
  .badge { display: inline-block; font-size: 0.68rem; font-weight: 700; border-radius: 3px; padding: 0.15rem 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge.today { background: #d1fae5; color: #065f46; }
  .badge.yesterday { background: #fef3c7; color: #92400e; }
  .btn { display: block; margin-top: auto; padding: 0.6rem 1rem; background: #1a1a2e; color: #fff; text-decoration: none; text-align: center; border-radius: 6px; font-size: 0.85rem; font-weight: 600; transition: background 0.15s; }
  .btn:hover { background: #2d2d5e; }
  .empty-state { text-align: center; padding: 4rem 1rem; color: #888; font-size: 1.1rem; }
  footer { text-align: center; padding: 2rem; font-size: 0.75rem; color: #aaa; }
</style>
</head>
<body>
<header>
  <h1>SF Rentals - Fresh Listings</h1>
  <p class="meta">Generated: 2026-04-12T07:01:42.856436+00:00 UTC</p>
</header>
<div class="filter-bar">1+ bed &middot; $3,000-$4,000/mo &middot; Listed in last 24hrs &middot; Excl. Nob Hill, Tenderloin, Mission, SOMA</div>
<main>
  <div class="grid">
    <div class="empty-state"><p>No listings matched today's criteria. Check back soon!</p></div>
  </div>
</main>
<footer>Data sourced via Zillow API &mdash; 0 listing(s) matched</footer>
</body>
</html>
